version: "2.0"
source:
  xlsx: "docs/事务所流程/在留資格別必要情報一覧Ver2.xlsx"
  markdown: "docs/事务所流程/在留資格別必要情報一覧Ver2.ai-optimized.md"
schema:
  status_enum:
    - required
    - conditional
    - not_listed
  note_rule: "单元格若含有 〇/△ 之外的附加文字，保留到 note"
  execution_rule:
    - "required 默认必须收集"
    - "conditional 需先判断触发条件"
    - "not_listed 不等于绝对不需要"
documents:
  passport_copy: { source_rows: [4], label_zh: "护照复印件", label_ja: "パスポート写し" }
