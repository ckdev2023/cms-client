<a class="TodoItem" href="{{href}}">
  <div class="TodoItem__icon TodoItem__icon--{{tone}}">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
      <path
        d="M5 7.5A2.5 2.5 0 0 1 7.5 5h9A2.5 2.5 0 0 1 19 7.5v9A2.5 2.5 0 0 1 16.5 19h-9A2.5 2.5 0 0 1 5 16.5v-9Z"
        fill="currentColor"
        opacity="0.18"
      />
      <path d="M8 12h8" stroke="currentColor" stroke-width="2" stroke-linecap="round" opacity="0.9" />
    </svg>
  </div>
  <div class="TodoItem__main">
    <div class="TodoItem__title">{{title}}</div>
    <div class="TodoItem__subtitle typo-muted">{{subtitle}}</div>
  </div>
  <div class="TodoItem__right">
    <div class="TodoItem__value">{{value}}</div>
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" aria-hidden="true" class="TodoItem__chev">
      <path d="M9 18l6-6-6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
    </svg>
  </div>
</a>
