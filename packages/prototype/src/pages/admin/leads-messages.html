<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/styles/admin.css" />
    <title>咨询与会话 - Gyosei OS</title>
  </head>
  <body data-nav-open="false" data-active-nav="leads">
    <a href="#main" class="skip-link">跳到主要内容</a>

    <include src="/components/Admin/MobileNav.html"></include>

    <div class="app-shell">
      <aside class="side-nav" aria-label="侧边栏导航">
        <include src="/components/Admin/SideNav.html"></include>
      </aside>

      <div>
        <include
          src="/components/Admin/TopBar.html"
          data-search-placeholder="搜索：咨询 / 会话 / 客户..."
        ></include>

        <main id="main" class="page">
          <div class="page-header">
            <div>
              <h1 class="page-title">咨询与会话</h1>
              <p class="page-subtitle">统一处理新线索、客户咨询与案件沟通</p>
            </div>
            <div class="page-actions">
              <button class="btn-secondary" type="button">分配负责人</button>
              <button class="btn-primary" type="button">新建咨询</button>
            </div>
          </div>

          <div class="split">
            <section class="apple-card panel" aria-label="会话列表">
              <h2 class="section-title">待处理</h2>
              <div class="divider" style="margin: 12px 0"></div>
              <ul class="list">
                <li class="list-item">
                  <div class="list-item-title">王小明</div>
                  <div class="list-item-subtitle">我想了解经营管理签证材料清单</div>
                  <div class="muted" style="font-size: 12px; font-weight: 700">今天 09:12 · 未回复</div>
                </li>
                <li class="list-item">
                  <div class="list-item-title">陈雨</div>
                  <div class="list-item-subtitle">请问留学签证面签时间怎么约？</div>
                  <div class="muted" style="font-size: 12px; font-weight: 700">昨天 21:34 · 需跟进</div>
                </li>
                <li class="list-item">
                  <div class="list-item-title">佐藤健</div>
                  <div class="list-item-subtitle">材料已补齐，下一步怎么走</div>
                  <div class="muted" style="font-size: 12px; font-weight: 700">上周 · 已回复</div>
                </li>
              </ul>
            </section>

            <section class="apple-card panel" aria-label="会话详情">
              <div style="display: flex; align-items: center; justify-content: space-between; gap: 12px">
                <div>
                  <h2 class="section-title" style="margin: 0">王小明</h2>
                  <div class="muted" style="font-size: 12px; font-weight: 700">咨询 · 经营管理签证</div>
                </div>
                <a class="btn-secondary" href="case-create.html">转为案件</a>
              </div>
              <div class="divider" style="margin: 12px 0"></div>

              <div class="message" style="margin-bottom: 14px">
                <div class="message-bubble">我想了解经营管理签证需要哪些材料？</div>
                <div class="message-bubble message-bubble--me">
                  我们可以先确认公司类型与经营计划，我会把材料清单发给你，并约一个 15 分钟电话沟通。
                </div>
                <div class="message-bubble">可以的，我下午 3 点后比较方便。</div>
              </div>

              <div class="field">
                <label class="label" for="reply">快速回复</label>
                <textarea class="textarea" id="reply" placeholder="输入回复内容..."></textarea>
              </div>
              <div class="form-actions" style="margin-top: 10px">
                <button class="btn-secondary" type="button">保存为备注</button>
                <button class="btn-primary" type="button">发送</button>
              </div>
            </section>
          </div>
        </main>
      </div>
    </div>

    <script type="module" src="./admin.js"></script>
  </body>
</html>
