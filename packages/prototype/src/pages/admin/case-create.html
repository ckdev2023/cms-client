<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/styles/admin.css" />
    <title>新建案件 - Gyosei OS</title>
  </head>
  <body data-nav-open="false" data-active-nav="cases">
    <a href="#main" class="skip-link">跳到主要内容</a>

    <include src="/components/Admin/MobileNav.html"></include>

    <div class="app-shell">
      <aside class="side-nav" aria-label="侧边栏导航">
        <include src="/components/Admin/SideNav.html"></include>
      </aside>

      <div>
        <include
          src="/components/Admin/TopBar.html"
          data-search-placeholder="搜索：客户 / 事项 / 模板..."
        ></include>

        <main id="main" class="page" style="max-width: 900px">
          <div class="page-header">
            <div>
              <h1 class="page-title">新建案件</h1>
              <p class="page-subtitle">创建后可分配负责人、生成材料清单与任务</p>
            </div>
            <div class="page-actions">
              <a class="btn-secondary" href="cases-list.html">取消</a>
              <button class="btn-primary" type="button">保存</button>
            </div>
          </div>

          <section class="section">
            <div class="apple-card" style="padding: 18px">
              <form class="form" action="#" method="post">
                <div class="field">
                  <label class="label" for="caseType">案件类型</label>
                  <select class="select" id="caseType" name="caseType">
                    <option>经营管理签证</option>
                    <option>留学签证</option>
                    <option>家族滞在</option>
                    <option>签证更新</option>
                  </select>
                </div>

                <div class="field">
                  <label class="label" for="customer">客户</label>
                  <input class="input" id="customer" name="customer" placeholder="输入客户姓名或编号" />
                  <div class="hint">建议先从“客户”模块创建客户，再在这里选择</div>
                </div>

                <div class="field">
                  <label class="label" for="assignee">负责人</label>
                  <select class="select" id="assignee" name="assignee">
                    <option>AD</option>
                    <option>YX</option>
                    <option>HG</option>
                  </select>
                </div>

                <div class="field">
                  <label class="label" for="deadline">截止日期</label>
                  <input class="input" id="deadline" name="deadline" type="date" />
                </div>

                <div class="field">
                  <label class="label" for="note">备注</label>
                  <textarea class="textarea" id="note" name="note" placeholder="补充说明、风险点、约束条件"></textarea>
                </div>

                <div class="form-actions">
                  <button class="btn-secondary" type="button">保存为草稿</button>
                  <button class="btn-primary" type="submit">创建并进入详情</button>
                </div>
              </form>
            </div>
          </section>
        </main>
      </div>
    </div>

    <script type="module" src="./admin.js"></script>
  </body>
</html>
