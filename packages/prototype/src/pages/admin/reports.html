<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/styles/admin.css" />
    <title>报表 - Gyosei OS</title>
  </head>
  <body data-nav-open="false" data-active-nav="reports">
    <a href="#main" class="skip-link">跳到主要内容</a>

    <include src="/components/Admin/MobileNav.html"></include>

    <div class="app-shell">
      <aside class="side-nav" aria-label="侧边栏导航">
        <include src="/components/Admin/SideNav.html"></include>
      </aside>

      <div>
        <include
          src="/components/Admin/TopBar.html"
          data-search-placeholder="搜索：指标 / 客户 / 案件..."
        ></include>

        <main id="main" class="page">
          <div class="page-header">
            <div>
              <h1 class="page-title">报表</h1>
              <p class="page-subtitle">经营数据与交付数据概览（原型）</p>
            </div>
            <div class="page-actions">
              <button class="btn-secondary" type="button">导出</button>
              <button class="btn-primary" type="button">创建仪表板</button>
            </div>
          </div>

          <section class="section">
            <div class="grid grid-3">
              <div class="apple-card stat-card">
                <div class="stat-label">新咨询</div>
                <div class="stat-value">48</div>
                <div class="stat-meta">近 7 天</div>
              </div>
              <div class="apple-card stat-card">
                <div class="stat-label">转化率</div>
                <div class="stat-value">19.6%</div>
                <div class="stat-meta">咨询 → 案件</div>
              </div>
              <div class="apple-card stat-card">
                <div class="stat-label">平均周期</div>
                <div class="stat-value">21 天</div>
                <div class="stat-meta">立案 → 完成</div>
              </div>
            </div>
          </section>

          <section class="section">
            <div class="apple-card panel">
              <h2 class="section-title">案件状态分布</h2>
              <div class="divider" style="margin: 12px 0"></div>
              <div class="table-wrap">
                <table class="apple-table" aria-label="案件状态分布">
                  <thead>
                    <tr>
                      <th>状态</th>
                      <th>数量</th>
                      <th>占比</th>
                      <th>备注</th>
                    </tr>
                  </thead>
                  <tbody>
                    <tr>
                      <td><span class="badge badge-active">进行中</span></td>
                      <td>18</td>
                      <td>58%</td>
                      <td>材料收集中为主</td>
                    </tr>
                    <tr>
                      <td><span class="badge badge-pending">待材料</span></td>
                      <td>9</td>
                      <td>29%</td>
                      <td>建议设定 SLA 提醒</td>
                    </tr>
                    <tr>
                      <td><span class="badge badge-alert">超时风险</span></td>
                      <td>4</td>
                      <td>13%</td>
                      <td>需优先处理</td>
                    </tr>
                  </tbody>
                </table>
              </div>
            </div>
          </section>
        </main>
      </div>
    </div>

    <script type="module" src="./admin.js"></script>
  </body>
</html>
