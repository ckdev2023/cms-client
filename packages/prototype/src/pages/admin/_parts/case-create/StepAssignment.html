<div class="form">
  <div class="field">
    <label class="label" for="assigneeId">负责人</label>
    <select class="select" id="assigneeId" name="assigneeId" data-case-create-field="assigneeId"></select>
  </div>

  <div class="field">
    <label class="label" for="deadline">预计期限</label>
    <input class="input" id="deadline" name="deadline" type="date" data-case-create-field="deadline" />
  </div>

  <div class="field">
    <label class="label" for="amount">合同金额（可选）</label>
    <input class="input" id="amount" name="amount" inputmode="numeric" placeholder="例如：500000" data-case-create-field="amount" />
  </div>

  <div class="field">
    <label class="label" for="note">备注（可选）</label>
    <textarea class="textarea" id="note" name="note" placeholder="补充说明、风险点、约束条件" data-case-create-field="note"></textarea>
  </div>
</div>
