<div class="case-create-confirm">
  <div class="case-create-confirm-title">确认信息</div>

  <div class="case-create-confirm-grid">
    <div class="case-create-confirm-item">
      <div class="case-create-confirm-label">案件名称</div>
      <div class="case-create-confirm-value" data-case-create-summary="title">未填写</div>
      <button class="case-create-confirm-edit" type="button" data-case-create-action="jump" data-case-create-step="0">编辑</button>
    </div>

    <div class="case-create-confirm-item">
      <div class="case-create-confirm-label">业务类型</div>
      <div class="case-create-confirm-value" data-case-create-summary="visaType">未选择</div>
      <button class="case-create-confirm-edit" type="button" data-case-create-action="jump" data-case-create-step="0">编辑</button>
    </div>

    <div class="case-create-confirm-item">
      <div class="case-create-confirm-label">关联客户</div>
      <div class="case-create-confirm-value" data-case-create-summary="customer">未选择</div>
      <button class="case-create-confirm-edit" type="button" data-case-create-action="jump" data-case-create-step="1">编辑</button>
    </div>

    <div class="case-create-confirm-item">
      <div class="case-create-confirm-label">负责人</div>
      <div class="case-create-confirm-value" data-case-create-summary="assignee">未选择</div>
      <button class="case-create-confirm-edit" type="button" data-case-create-action="jump" data-case-create-step="2">编辑</button>
    </div>

    <div class="case-create-confirm-item">
      <div class="case-create-confirm-label">预计期限</div>
      <div class="case-create-confirm-value" data-case-create-summary="deadline">未填写</div>
      <button class="case-create-confirm-edit" type="button" data-case-create-action="jump" data-case-create-step="2">编辑</button>
    </div>

    <div class="case-create-confirm-item">
      <div class="case-create-confirm-label">合同金额</div>
      <div class="case-create-confirm-value" data-case-create-summary="amount">未填写</div>
      <button class="case-create-confirm-edit" type="button" data-case-create-action="jump" data-case-create-step="2">编辑</button>
    </div>

    <div class="case-create-confirm-item case-create-confirm-item--full">
      <div class="case-create-confirm-label">备注</div>
      <div class="case-create-confirm-value" data-case-create-summary="note">—</div>
      <button class="case-create-confirm-edit" type="button" data-case-create-action="jump" data-case-create-step="2">编辑</button>
    </div>
  </div>
</div>
