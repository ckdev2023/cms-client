<div class="form">
  <div class="field">
    <label class="label" for="caseTitle">案件名称</label>
    <input class="input" id="caseTitle" name="title" placeholder="例如：就劳签证申请（王伟）" data-case-create-field="title" />
    <div class="hint">用于内部识别与后续材料/任务生成</div>
  </div>

  <div class="field">
    <label class="label" for="visaType">业务类型</label>
    <select class="select" id="visaType" name="visaTypeId" data-case-create-field="visaTypeId"></select>
  </div>
</div>
