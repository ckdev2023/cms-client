<div class="form">
  <div class="field">
    <label class="label" for="customerSearch">客户</label>
    <input
      class="input"
      id="customerSearch"
      name="customerSearch"
      placeholder="输入客户姓名"
      autocomplete="off"
      data-case-create-field="customerSearch"
    />
    <div class="case-create-suggest" data-case-create="customerSuggest" hidden></div>
    <div class="hint">已选择：<span data-case-create="customerPicked">未选择</span></div>
  </div>
</div>
