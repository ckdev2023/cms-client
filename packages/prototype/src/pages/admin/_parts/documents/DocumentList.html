<section class="section">
  <style>
    .documents-toolbar{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
    .documents-toolbar-left{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    .documents-toolbar-title{margin:0;font-size:14px;font-weight:900;color:var(--text)}
    .documents-view-toggle{display:inline-flex;gap:8px;align-items:center}
    .documents-view-btn.active{color:var(--text);border-color:rgba(3,105,161,.35);box-shadow:0 0 0 3px rgba(3,105,161,.12)}
    .documents-view-container{width:100%}
    .documents-grid-item{display:flex;flex-direction:column;gap:10px;min-height:120px}
    .documents-grid-title{font-size:14px;font-weight:900;color:var(--text)}
    .documents-grid-meta{font-size:12px;font-weight:800;color:var(--muted-2)}
    .documents-grid-actions{margin-top:auto}
  </style>

  <div class="documents-toolbar">
    <div class="documents-toolbar-left">
      <h2 class="documents-toolbar-title">资料列表</h2>
    </div>

    <div class="documents-view-toggle" role="tablist" aria-label="视图切换">
      <button
        class="icon-btn documents-view-btn active"
        type="button"
        role="tab"
        aria-selected="true"
        data-documents-view="list"
        aria-label="列表视图"
      >
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
      </button>
      <button
        class="icon-btn documents-view-btn"
        type="button"
        role="tab"
        aria-selected="false"
        data-documents-view="grid"
        aria-label="网格视图"
      >
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" aria-hidden="true"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
      </button>
    </div>
  </div>

  <include src="/pages/admin/_parts/documents/ViewContainers.html"></include>
</section>
