    <title>Gyosei OS - Apple Style Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap");

      :root {
        --apple-blue: #0369a1;
        --apple-blue-hover: #075985;
        --apple-link: #0369a1;
        --apple-bg: #f8fafc;
        --apple-card: #ffffff;
        --apple-text-main: #0f172a;
        --apple-text-sec: #475569;
        --apple-text-tert: #64748b;
        --apple-shadow: 0 1px 2px rgba(15, 23, 42, 0.06), 0 10px 28px rgba(15, 23, 42, 0.08);
        --apple-shadow-hover: 0 2px 6px rgba(15, 23, 42, 0.08), 0 18px 44px rgba(15, 23, 42, 0.12);
        --border: #e2e8f0;
        --surface-2: #f1f5f9;
        --radius: 14px;
        --bg: var(--apple-bg);
        --surface: var(--apple-card);
        --text: var(--apple-text-main);
        --muted: var(--apple-text-sec);
        --muted-2: var(--apple-text-tert);
        --primary: var(--apple-blue);
        --primary-hover: var(--apple-blue-hover);
        --shadow: var(--apple-shadow);
      }

      body {
        font-family:
          "Plus Jakarta Sans",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          Helvetica,
          Arial,
          sans-serif;
        background-color: var(--apple-bg);
        color: var(--apple-text-main);
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        letter-spacing: -0.01em;
      }

      h1,
      h2,
      h3,
      h4,
      .display-font {
        font-family: inherit;
        letter-spacing: -0.01em;
      }

      .text-hero {
        font-size: 34px;
        font-weight: 800;
        line-height: 1.12;
        letter-spacing: -0.02em;
      }

      .text-card-title {
        font-size: 16px;
        font-weight: 800;
        line-height: 1.25;
      }

      .glass-nav {
        background: rgba(248, 250, 252, 0.92);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border-bottom: 1px solid var(--border);
      }

      .app-shell {
        min-height: 100vh;
        display: grid;
        grid-template-columns: 1fr;
      }
      @media (min-width: 1024px) {
        .app-shell {
          grid-template-columns: 280px 1fr;
        }
      }

      .side-nav {
        background: var(--surface);
        border-right: 1px solid var(--border);
      }
      .side-nav-inner {
        height: 100vh;
        position: sticky;
        top: 0;
        display: flex;
        flex-direction: column;
        padding: 14px;
        gap: 14px;
      }
      .brand {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 10px 10px 6px 10px;
      }
      .brand-title {
        font-size: 15px;
        font-weight: 900;
        letter-spacing: -0.02em;
      }
      .chip {
        display: inline-flex;
        align-items: center;
        border-radius: 999px;
        padding: 4px 10px;
        font-size: 12px;
        font-weight: 900;
        border: 1px solid rgba(226, 232, 240, 0.9);
        background: rgba(241, 245, 249, 0.9);
        color: var(--text);
      }
      .nav-group-title {
        font-size: 11px;
        color: var(--muted-2);
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        padding: 10px 10px 6px 10px;
      }
      .nav-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 10px;
        border-radius: 12px;
        color: var(--muted);
        font-size: 14px;
        font-weight: 800;
        transition:
          background-color 160ms ease,
          color 160ms ease;
      }
      .nav-item:hover {
        background: var(--surface-2);
        color: var(--text);
      }
      .nav-item[aria-current="page"] {
        background: rgba(3, 105, 161, 0.1);
        color: var(--text);
      }
      .nav-item svg {
        width: 18px;
        height: 18px;
        flex: 0 0 auto;
      }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 40;
        background: rgba(248, 250, 252, 0.92);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border-bottom: 1px solid var(--border);
      }
      .topbar-inner {
        max-width: 1280px;
        margin: 0 auto;
        padding: 14px 16px;
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .search {
        flex: 1 1 auto;
        min-width: 180px;
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 12px;
        border: 1px solid var(--border);
        border-radius: 14px;
        background: var(--surface);
        box-shadow: 0 1px 0 rgba(15, 23, 42, 0.03);
      }
      .search svg {
        width: 18px;
        height: 18px;
        color: var(--muted-2);
        flex: 0 0 auto;
      }
      .search input {
        width: 100%;
        border: none;
        outline: none;
        font-size: 14px;
        font-weight: 600;
        color: var(--text);
        background: transparent;
      }
      .search input::placeholder {
        color: rgba(100, 116, 139, 0.9);
        font-weight: 600;
      }

      .btn-primary {
        background-color: var(--apple-blue);
        color: white;
        padding: 10px 14px;
        border-radius: var(--radius);
        font-size: 14px;
        font-weight: 800;
        transition:
          background-color 160ms ease,
          transform 120ms ease;
        box-shadow: 0 8px 18px rgba(3, 105, 161, 0.22);
      }
      .btn-primary:hover {
        background-color: var(--apple-blue-hover);
      }
      .btn-primary:active {
        transform: translateY(1px);
      }

      .btn-pill {
        color: var(--apple-text-main);
        padding: 10px 14px;
        border-radius: var(--radius);
        font-size: 14px;
        font-weight: 800;
        background: var(--apple-card);
        border: 1px solid var(--border);
        transition:
          background-color 160ms ease,
          border-color 160ms ease,
          transform 120ms ease;
      }
      .btn-pill:hover {
        background-color: var(--surface-2);
      }
      .btn-pill:active {
        transform: translateY(1px);
      }

      .segmented-control {
        background: rgba(118, 118, 128, 0.12);
        padding: 2px;
        border-radius: 12px;
        display: inline-flex;
        border: 1px solid rgba(226, 232, 240, 0.9);
      }
      .segment-btn {
        padding: 8px 12px;
        font-size: 13px;
        font-weight: 900;
        color: var(--muted);
        border-radius: 10px;
        transition:
          background-color 160ms ease,
          color 160ms ease;
        cursor: pointer;
        user-select: none;
      }
      .segment-btn.active {
        background: var(--surface);
        color: var(--text);
        box-shadow:
          0 3px 8px rgba(0, 0, 0, 0.12),
          0 3px 1px rgba(0, 0, 0, 0.04);
      }

      .link-apple {
        color: var(--apple-link);
        font-size: 14px;
        font-weight: 800;
        text-decoration: none;
      }
      .link-apple:hover {
        opacity: 0.85;
      }

      .apple-card {
        background-color: var(--apple-card);
        border-radius: var(--radius);
        box-shadow: var(--apple-shadow);
        transition:
          box-shadow 0.3s ease,
          transform 0.3s ease;
        border: 1px solid var(--border);
      }
      .apple-card:hover {
        box-shadow: var(--apple-shadow-hover);
        transform: translateY(-1px);
      }

      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        display: inline-block;
        margin-right: 6px;
      }
      .status-active {
        background-color: #34c759;
      }
      .status-pending {
        background-color: #ff9500;
      }
      .status-alert {
        background-color: #ff3b30;
      }

      .apple-table th {
        font-size: 12px;
        color: var(--apple-text-tert);
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        padding-bottom: 12px;
        border-bottom: 1px solid var(--border);
      }
      .apple-table td {
        padding: 16px 0;
        font-size: 14px;
        border-bottom: 1px solid rgba(226, 232, 240, 0.7);
        color: var(--apple-text-sec);
      }
      .apple-table tr:last-child td {
        border-bottom: none;
      }

      .skip-link {
        position: absolute;
        left: 16px;
        top: 8px;
        transform: translateY(-200%);
        background: var(--apple-card);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 8px 12px;
        box-shadow: var(--apple-shadow);
        z-index: 1000;
      }
      .skip-link:focus {
        transform: translateY(0);
      }

      :where(a, button, input, select, textarea):focus-visible {
        outline: 2px solid rgba(3, 105, 161, 0.35);
        outline-offset: 2px;
        border-radius: 10px;
      }
    </style>
