<!-- Metrics Grid -->
<section class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4 md:gap-6 mb-8">
  <div class="apple-card p-6 flex flex-col justify-between h-40 relative overflow-hidden group cursor-pointer">
    <div class="absolute right-0 top-0 w-24 h-24 bg-red-50 rounded-bl-full -mr-4 -mt-4 transition-transform group-hover:scale-110"></div>
    <div class="flex justify-between items-start relative z-10">
      <span class="text-sm font-semibold text-[color:var(--apple-text-tert)]">今日待办</span>
      <span class="status-dot status-alert"></span>
    </div>
    <div class="relative z-10">
      <div class="display-font text-[40px] font-extrabold leading-none mb-1 text-[color:var(--apple-text-main)]" data-metric="todoCount">8</div>
      <div class="text-[13px] text-[#d61818] font-medium" data-metric-sub="todoSub">今日到期 3 · 已逾期 2</div>
    </div>
  </div>

  <div class="apple-card p-6 flex flex-col justify-between h-40 relative overflow-hidden group cursor-pointer">
    <div class="absolute right-0 top-0 w-24 h-24 bg-orange-50 rounded-bl-full -mr-4 -mt-4 transition-transform group-hover:scale-110"></div>
    <div class="flex justify-between items-start relative z-10">
      <span class="text-sm font-semibold text-[color:var(--apple-text-tert)]">即将到期案件</span>
      <span class="status-dot status-pending"></span>
    </div>
    <div class="relative z-10">
      <div class="display-font text-[40px] font-extrabold leading-none mb-1 text-[color:var(--apple-text-main)]" data-metric="dueCount">12</div>
      <div class="text-[13px] text-[#ff9500] font-medium" data-metric-sub="dueSub">7 天内 5 · 30 天内 12</div>
    </div>
  </div>

  <div class="apple-card p-6 flex flex-col justify-between h-40 relative overflow-hidden group cursor-pointer">
    <div class="absolute right-0 top-0 w-24 h-24 bg-green-50 rounded-bl-full -mr-4 -mt-4 transition-transform group-hover:scale-110"></div>
    <div class="flex justify-between items-start relative z-10">
      <span class="text-sm font-semibold text-[color:var(--apple-text-tert)]">待补件案件</span>
      <span class="status-dot status-active"></span>
    </div>
    <div class="relative z-10">
      <div class="display-font text-[40px] font-extrabold leading-none mb-1 text-[color:var(--apple-text-main)]" data-metric="missingCount">28</div>
      <div class="text-[13px] text-[#118128] font-medium" data-metric-sub="missingSub">近 24h 退回补正 6</div>
    </div>
  </div>

  <div class="apple-card p-6 flex flex-col justify-between h-40 relative overflow-hidden group cursor-pointer">
    <div class="absolute right-0 top-0 w-24 h-24 bg-indigo-50 rounded-bl-full -mr-4 -mt-4 transition-transform group-hover:scale-110"></div>
    <div class="flex justify-between items-start relative z-10">
      <span class="text-sm font-semibold text-[color:var(--apple-text-tert)]">待提交案件（S6）</span>
      <span class="status-dot status-pending"></span>
    </div>
    <div class="relative z-10">
      <div class="display-font text-[40px] font-extrabold leading-none mb-1 text-[color:var(--apple-text-main)]" data-metric="submitCount">6</div>
      <div class="text-[13px] text-[color:var(--apple-link)] font-semibold" data-metric-sub="submitSub">校验通过待复核 2</div>
    </div>
  </div>

  <div class="apple-card p-6 flex flex-col justify-between h-40 relative overflow-hidden group cursor-pointer">
    <div class="absolute right-0 top-0 w-24 h-24 bg-rose-50 rounded-bl-full -mr-4 -mt-4 transition-transform group-hover:scale-110"></div>
    <div class="flex justify-between items-start relative z-10">
      <span class="text-sm font-semibold text-[color:var(--apple-text-tert)]">风险案件</span>
      <span class="status-dot status-alert"></span>
    </div>
    <div class="relative z-10">
      <div class="display-font text-[40px] font-extrabold leading-none mb-1 text-[color:var(--apple-text-main)]" data-metric="riskCount">3</div>
      <div class="text-[13px] text-[#d61818] font-medium" data-metric-sub="riskSub">硬性阻断 1 · 欠款影响提交 1</div>
    </div>
  </div>

  <div class="apple-card p-6 flex flex-col justify-between h-40 relative overflow-hidden group cursor-pointer">
    <div class="absolute right-0 top-0 w-24 h-24 bg-teal-50 rounded-bl-full -mr-4 -mt-4 transition-transform group-hover:scale-110"></div>
    <div class="flex justify-between items-start relative z-10">
      <span class="text-sm font-semibold text-[color:var(--apple-text-tert)]">审理中案件（S7）</span>
      <span class="status-dot status-active"></span>
    </div>
    <div class="relative z-10">
      <div class="display-font text-[40px] font-extrabold leading-none mb-1 text-[color:var(--apple-text-main)]" data-metric="reviewingCount">19</div>
      <div class="text-[13px] text-[#118128] font-medium" data-metric-sub="reviewingSub">本周新增补正任务 4</div>
    </div>
  </div>

  <div class="apple-card p-6 flex flex-col justify-between h-40 relative overflow-hidden group cursor-pointer">
    <div class="absolute right-0 top-0 w-24 h-24 bg-amber-50 rounded-bl-full -mr-4 -mt-4 transition-transform group-hover:scale-110"></div>
    <div class="flex justify-between items-start relative z-10">
      <span class="text-sm font-semibold text-[color:var(--apple-text-tert)]">待回款案件</span>
      <span class="status-dot status-pending"></span>
    </div>
    <div class="relative z-10">
      <div class="display-font text-[40px] font-extrabold leading-none mb-1 text-[color:var(--apple-text-main)]" data-metric="receivableCount">7</div>
      <div class="text-[13px] text-[#ff9500] font-medium" data-metric-sub="receivableSub">未收 ¥1,280,000</div>
    </div>
  </div>

  <div class="apple-card p-6 flex flex-col justify-between h-40 relative overflow-hidden group cursor-pointer">
    <div class="absolute right-0 top-0 w-24 h-24 bg-blue-50 rounded-bl-full -mr-4 -mt-4 transition-transform group-hover:scale-110"></div>
    <div class="flex justify-between items-start relative z-10">
      <span class="text-sm font-semibold text-[color:var(--apple-text-tert)]">本月新增案件</span>
      <div class="w-9 h-9 rounded-full bg-[color:var(--surface-2)] text-[color:var(--apple-blue)] flex items-center justify-center border border-[color:var(--border)]">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
        </svg>
      </div>
    </div>
    <div class="relative z-10">
      <div class="display-font text-[40px] font-extrabold leading-none mb-1 text-[color:var(--apple-text-main)]" data-metric="newCasesCount">23</div>
      <div class="text-[13px] text-[color:var(--apple-link)] font-semibold flex items-center">
        <svg class="w-3 h-3 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 10l7-7m0 0l7 7m-7-7v18"></path>
        </svg>
        <span data-metric-sub="newCasesSub">9% 较上月</span>
      </div>
    </div>
  </div>
</section>
