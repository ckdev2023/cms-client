  document.addEventListener('DOMContentLoaded', () => {
    const scopeButtons = Array.from(document.querySelectorAll('[data-scope-btn]'));
    const roleButtons = Array.from(document.querySelectorAll('[data-role-btn]'));
    const heroGreeting = document.getElementById('heroGreeting');
    const heroSubtitle = document.getElementById('heroSubtitle');

    const metricEl = (key) => document.querySelector(`[data-metric="${key}"]`);
    const metricSubEl = (key) => document.querySelector(`[data-metric-sub="${key}"]`);

    const scopeData = {
      mine: {
        todoCount: '8',
        todoSub: '今日到期 3 · 已逾期 2',
        dueCount: '12',
        dueSub: '7 天内 5 · 30 天内 12',
        missingCount: '28',
        missingSub: '近 24h 退回补正 6',
        submitCount: '6',
        submitSub: '校验通过待复核 2',
        riskCount: '3',
        riskSub: '硬性阻断 1 · 欠款影响提交 1',
        reviewingCount: '19',
        reviewingSub: '本周新增补正任务 4',
        receivableCount: '7',
        receivableSub: '未收 ¥1,280,000',
        newCasesCount: '23',
        newCasesSub: '9% 较上月',
        monthPaid: '¥3,420,000',
        monthPaidSub: '较上月 +12%',
        monthReceivable: '¥4,680,000',
        monthReceivableSub: '未收占比 27%',
      },
      group: {
        todoCount: '23',
        todoSub: '今日到期 9 · 已逾期 4',
        dueCount: '38',
        dueSub: '7 天内 16 · 30 天内 38',
        missingCount: '64',
        missingSub: '近 24h 退回补正 11',
        submitCount: '14',
        submitSub: '校验通过待复核 5',
        riskCount: '9',
        riskSub: '硬性阻断 3 · 欠款影响提交 2',
        reviewingCount: '51',
        reviewingSub: '本周新增补正任务 12',
        receivableCount: '19',
        receivableSub: '未收 ¥4,120,000',
        newCasesCount: '61',
        newCasesSub: '13% 较上月',
        monthPaid: '¥10,820,000',
        monthPaidSub: '较上月 +8%',
        monthReceivable: '¥13,900,000',
        monthReceivableSub: '未收占比 22%',
      },
      all: {
        todoCount: '58',
        todoSub: '今日到期 21 · 已逾期 9',
        dueCount: '102',
        dueSub: '7 天内 41 · 30 天内 102',
        missingCount: '188',
        missingSub: '近 24h 退回补正 36',
        submitCount: '31',
        submitSub: '校验通过待复核 12',
        riskCount: '21',
        riskSub: '硬性阻断 7 · 欠款影响提交 6',
        reviewingCount: '164',
        reviewingSub: '本周新增补正任务 28',
        receivableCount: '63',
        receivableSub: '未收 ¥12,840,000',
        newCasesCount: '172',
        newCasesSub: '6% 较上月',
        monthPaid: '¥28,420,000',
        monthPaidSub: '较上月 +5%',
        monthReceivable: '¥34,680,000',
        monthReceivableSub: '未收占比 18%',
      },
    };

    const roleCopy = {
      principal: {
        titleSuffix: '主办人',
        subtitle: '今天优先关注：待提交、风险、到期与欠款影响提交。',
      },
      assistant: {
        titleSuffix: '助理',
        subtitle: '今天优先关注：缺件催办、资料审核、到期与补正截止。',
      },
      sales: {
        titleSuffix: '销售',
        subtitle: '今天优先关注：新线索跟进、待签约与线索转案件。',
      },
      finance: {
        titleSuffix: '财务',
        subtitle: '今天优先关注：到期应收、欠款影响提交与凭证归档。',
      },
    };

    let activeScope = 'mine';
    let activeRole = 'principal';

    const applyScope = (scope) => {
      activeScope = scope;
      scopeButtons.forEach((btn) => {
        const isActive = btn.getAttribute('data-scope-btn') === scope;
        btn.classList.toggle('active', isActive);
        btn.setAttribute('aria-pressed', isActive ? 'true' : 'false');
      });

      const data = scopeData[scope];
      if (!data) return;

      Object.entries(data).forEach(([key, value]) => {
        const el = metricEl(key);
        if (el) el.textContent = value;
        const subEl = metricSubEl(key);
        if (subEl) subEl.textContent = value;
      });
    };

    const applyRole = (role) => {
      activeRole = role;
      roleButtons.forEach((btn) => {
        const isActive = btn.getAttribute('data-role-btn') === role;
        btn.classList.toggle('ring-2', isActive);
        btn.classList.toggle('ring-[color:var(--apple-blue)]', isActive);
        btn.setAttribute('aria-pressed', isActive ? 'true' : 'false');
      });
      const copy = roleCopy[role];
      if (!copy) return;
      heroGreeting.textContent = `早上好，Admin · ${copy.titleSuffix}`;
      heroSubtitle.textContent = copy.subtitle;
    };

    scopeButtons.forEach((btn) => {
      btn.addEventListener('click', () => {
        const scope = btn.getAttribute('data-scope-btn');
        if (!scope) return;
        applyScope(scope);
      });
    });

    roleButtons.forEach((btn) => {
      btn.addEventListener('click', () => {
        const role = btn.getAttribute('data-role-btn');
        if (!role) return;
        applyRole(role);
      });
    });

    applyScope(activeScope);
    applyRole(activeRole);
  });
</script>
