<!-- Chart Section -->
<section class="mb-8">
  <div class="apple-card p-8">
    <div class="flex justify-between items-center mb-6">
      <h2 class="text-card-title">业务趋势 (Business Trends)</h2>
      <select
        class="border border-[color:var(--border)] rounded-xl px-3 py-2 text-[13px] outline-none bg-[color:var(--apple-card)] font-semibold text-[color:var(--apple-text-main)]"
      >
        <option>近 6 个月</option>
        <option>今年</option>
        <option>去年</option>
      </select>
    </div>
    <div
      class="h-64 w-full bg-[color:var(--surface-2)] rounded-2xl border border-[color:var(--border)] flex items-end justify-around px-6 md:px-8 pt-8 pb-4 relative"
    >
      <!-- Placeholder Chart Bars -->
      <!-- Y-axis lines -->
      <div
        class="absolute left-0 w-full border-t border-dashed border-gray-200 bottom-4"
      ></div>
      <div
        class="absolute left-0 w-full border-t border-dashed border-gray-200 bottom-1/4"
      ></div>
      <div
        class="absolute left-0 w-full border-t border-dashed border-gray-200 bottom-2/4"
      ></div>
      <div
        class="absolute left-0 w-full border-t border-dashed border-gray-200 bottom-3/4"
      ></div>

      <div class="flex flex-col items-center z-10 group">
        <div
          class="w-12 bg-blue-100 rounded-t-md h-32 group-hover:bg-blue-200 transition-colors relative"
        >
          <div
            class="absolute bottom-0 w-full bg-blue-500 rounded-t-md h-20 group-hover:bg-blue-600 transition-colors"
          ></div>
        </div>
        <span class="text-[12px] text-[color:var(--apple-text-tert)] mt-2 font-semibold">11月</span>
      </div>
      <div class="flex flex-col items-center z-10 group">
        <div
          class="w-12 bg-blue-100 rounded-t-md h-40 group-hover:bg-blue-200 transition-colors relative"
        >
          <div
            class="absolute bottom-0 w-full bg-blue-500 rounded-t-md h-24 group-hover:bg-blue-600 transition-colors"
          ></div>
        </div>
        <span class="text-[12px] text-[color:var(--apple-text-tert)] mt-2 font-semibold">12月</span>
      </div>
      <div class="flex flex-col items-center z-10 group">
        <div
          class="w-12 bg-blue-100 rounded-t-md h-28 group-hover:bg-blue-200 transition-colors relative"
        >
          <div
            class="absolute bottom-0 w-full bg-blue-500 rounded-t-md h-16 group-hover:bg-blue-600 transition-colors"
          ></div>
        </div>
        <span class="text-[12px] text-[color:var(--apple-text-tert)] mt-2 font-semibold">1月</span>
      </div>
      <div class="flex flex-col items-center z-10 group">
        <div
          class="w-12 bg-blue-100 rounded-t-md h-48 group-hover:bg-blue-200 transition-colors relative"
        >
          <div
            class="absolute bottom-0 w-full bg-blue-500 rounded-t-md h-32 group-hover:bg-blue-600 transition-colors"
          ></div>
        </div>
        <span class="text-[12px] text-[color:var(--apple-text-tert)] mt-2 font-semibold">2月</span>
      </div>
      <div class="flex flex-col items-center z-10 group">
        <div
          class="w-12 bg-blue-100 rounded-t-md h-56 group-hover:bg-blue-200 transition-colors relative"
        >
          <div
            class="absolute bottom-0 w-full bg-blue-500 rounded-t-md h-40 group-hover:bg-blue-600 transition-colors"
          ></div>
        </div>
        <span class="text-[12px] text-[color:var(--apple-text-tert)] mt-2 font-semibold">3月</span>
      </div>
      <div class="flex flex-col items-center z-10 group">
        <div
          class="w-12 bg-blue-100 rounded-t-md h-64 group-hover:bg-blue-200 transition-colors relative"
        >
          <div
            class="absolute bottom-0 w-full bg-blue-500 rounded-t-md h-48 group-hover:bg-blue-600 transition-colors"
          ></div>
        </div>
        <span class="text-[12px] text-[color:var(--apple-text-main)] font-extrabold mt-2">本月</span>
      </div>

      <!-- Legend -->
      <div class="absolute top-4 right-6 flex space-x-4">
        <div class="flex items-center text-[12px] text-[color:var(--apple-text-tert)] font-semibold">
          <div class="w-3 h-3 rounded-full bg-blue-500 mr-1.5"></div>
          已归档
        </div>
        <div class="flex items-center text-[12px] text-[color:var(--apple-text-tert)] font-semibold">
          <div class="w-3 h-3 rounded-full bg-blue-100 mr-1.5"></div>
          新增
        </div>
      </div>
    </div>
  </div>
</section>
