<!-- Hero Section -->
<header class="mb-10">
  <div>
    <h1 class="text-hero mb-2" id="heroGreeting">早上好，Admin</h1>
    <p class="text-[15px] text-[color:var(--apple-text-tert)] font-semibold" id="heroSubtitle">
      今天优先关注：待提交、风险、到期与欠款影响提交。
    </p>
    <div class="mt-5 flex flex-col md:flex-row md:items-center gap-3 md:gap-4">
      <div class="flex items-center gap-3 flex-wrap">
        <div class="segmented-control" role="group" aria-label="工作台范围">
          <button class="segment-btn active" type="button" data-scope-btn="mine" aria-pressed="true">我的</button>
          <button class="segment-btn" type="button" data-scope-btn="group" aria-pressed="false">本组</button>
          <button class="segment-btn" type="button" data-scope-btn="all" aria-pressed="false">全所</button>
        </div>
        <select
          class="border border-[color:var(--border)] rounded-xl px-3 py-2 text-[13px] outline-none bg-[color:var(--apple-card)] font-semibold text-[color:var(--apple-text-main)]"
          aria-label="Group 过滤"
        >
          <option>全部 Group</option>
          <option>东京一组</option>
          <option>东京二组</option>
          <option>大阪组</option>
        </select>
      </div>

      <div class="flex items-center gap-2 flex-wrap md:ml-auto">
        <span class="text-[12px] text-[color:var(--apple-text-tert)] font-semibold">默认视图</span>
        <button class="chip cursor-pointer" type="button" data-role-btn="principal" aria-pressed="true">主办人</button>
        <button class="chip cursor-pointer" type="button" data-role-btn="assistant" aria-pressed="false">助理</button>
        <button class="chip cursor-pointer" type="button" data-role-btn="sales" aria-pressed="false">销售</button>
        <button class="chip cursor-pointer" type="button" data-role-btn="finance" aria-pressed="false">财务</button>
      </div>
    </div>
  </div>
</header>
