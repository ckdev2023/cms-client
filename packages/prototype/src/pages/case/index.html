<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles/app.css" />
    <link rel="stylesheet" href="./page.css" />
    <title>案例详情</title>
  </head>
  <body data-active-tab="case">
    <div class="AppShell">
      <div class="AppShell__phone">
        <div class="AppShell__screen">
          <div class="AppShell__safeTop"></div>
          <include src="/components/TopBar/TopBar.html" data-title="案例详情"></include>
          <div class="AppShell__content stack-6">
            <section class="Card CaseSummary">
              <div class="Card__inner stack-4">
                <div class="CaseSummary__top">
                  <div>
                    <div class="CaseSummary__title typo-title">工作签证 <span class="CaseSummary__loc">(洛杉矶)</span></div>
                    <div class="CaseSummary__meta typo-muted">Jared Jenkins · 2023.02.01</div>
                  </div>
                  <include src="/components/Chip/Chip.html" data-tone="info" data-label="进行中"></include>
                </div>
                <div class="CaseSummary__grid">
                  <div class="CaseSummary__kv">
                    <div class="CaseSummary__k">当前阶段</div>
                    <div class="CaseSummary__v">初审</div>
                  </div>
                  <div class="CaseSummary__kv">
                    <div class="CaseSummary__k">预计完成</div>
                    <div class="CaseSummary__v">2026.05.12</div>
                  </div>
                  <div class="CaseSummary__kv">
                    <div class="CaseSummary__k">负责人</div>
                    <div class="CaseSummary__v">Nancy</div>
                  </div>
                  <div class="CaseSummary__kv">
                    <div class="CaseSummary__k">风险提示</div>
                    <div class="CaseSummary__v CaseSummary__v--warn">待补充材料</div>
                  </div>
                </div>
                <div class="CaseSummary__actions">
                  <a class="Btn Btn--primary" href="/pages/todos/">查看待办</a>
                  <a class="Btn Btn--secondary" href="/pages/inbox/">查看消息</a>
                </div>
              </div>
            </section>

            <include src="/components/StageExplainer/StageExplainer.html"></include>

            <section class="stack-3">
              <include
                src="/components/SectionHeader/SectionHeader.html"
                data-title="办理进度"
                data-action="查看材料"
                data-href="/pages/todos/"
              ></include>
              <div class="stack-3">
                <div class="Card Card--flat CaseStep">
                  <div class="Card__inner CaseStep__inner">
                    <div class="CaseStep__dot CaseStep__dot--done"></div>
                    <div class="CaseStep__main">
                      <div class="CaseStep__title">资料收集</div>
                      <div class="CaseStep__sub typo-muted">已完成</div>
                    </div>
                    <div class="CaseStep__meta">02.18</div>
                  </div>
                </div>
                <div class="Card Card--flat CaseStep">
                  <div class="Card__inner CaseStep__inner">
                    <div class="CaseStep__dot CaseStep__dot--active"></div>
                    <div class="CaseStep__main">
                      <div class="CaseStep__title">初审</div>
                      <div class="CaseStep__sub typo-muted">进行中</div>
                    </div>
                    <div class="CaseStep__meta">预计 04.12</div>
                  </div>
                </div>
                <div class="Card Card--flat CaseStep">
                  <div class="Card__inner CaseStep__inner">
                    <div class="CaseStep__dot"></div>
                    <div class="CaseStep__main">
                      <div class="CaseStep__title">复审</div>
                      <div class="CaseStep__sub typo-muted">待开始</div>
                    </div>
                    <div class="CaseStep__meta">预计 05.12</div>
                  </div>
                </div>
              </div>
            </section>
          </div>
          <include src="/components/BottomTabBar/BottomTabBar.html"></include>
        </div>
      </div>
    </div>
    <script type="module" src="./page.js"></script>
  </body>
</html>
