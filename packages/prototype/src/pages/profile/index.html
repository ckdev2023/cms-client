<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles/app.css" />
    <link rel="stylesheet" href="./page.css" />
    <title>我的</title>
  </head>
  <body data-active-tab="profile">
    <div class="AppShell">
      <div class="AppShell__phone">
        <div class="AppShell__screen">
          <div class="AppShell__safeTop"></div>
          <include src="/components/TopBar/TopBar.html" data-title="我的"></include>
          <div class="AppShell__content stack-6">
            <section class="Card">
              <div class="Card__inner ProfileCard">
                <div class="ProfileCard__avatar" aria-hidden="true"></div>
                <div class="ProfileCard__main">
                  <div class="ProfileCard__name typo-title">Jared Jenkins</div>
                  <div class="ProfileCard__sub typo-muted">高级客户 · 洛杉矶</div>
                </div>
              </div>
            </section>

            <section class="stack-3">
              <include
                src="/components/SectionHeader/SectionHeader.html"
                data-title="支持"
                data-action="帮助"
                data-href="/pages/profile/"
              ></include>
              <div class="stack-3">
                <a class="Card ProfileLink" href="/pages/todos/">
                  <div class="Card__inner ProfileLink__inner">
                    <div class="ProfileLink__title">联系顾问</div>
                    <div class="ProfileLink__meta typo-muted">24 小时内回复</div>
                  </div>
                </a>
                <a class="Card ProfileLink" href="/pages/home/">
                  <div class="Card__inner ProfileLink__inner">
                    <div class="ProfileLink__title">回到工作台</div>
                    <div class="ProfileLink__meta typo-muted">查看最新待办与费用</div>
                  </div>
                </a>
              </div>
            </section>
          </div>
          <include src="/components/BottomTabBar/BottomTabBar.html"></include>
        </div>
      </div>
    </div>
    <script type="module" src="./page.js"></script>
  </body>
</html>
