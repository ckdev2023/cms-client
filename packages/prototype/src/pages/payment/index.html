<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Manrope:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles/app.css" />
    <link rel="stylesheet" href="./page.css" />
    <title>支付</title>
  </head>
  <body data-active-tab="payment">
    <div class="AppShell">
      <div class="AppShell__phone">
        <div class="AppShell__screen">
          <div class="AppShell__safeTop"></div>
          <include src="/components/TopBar/TopBar.html" data-title="支付"></include>
          <div class="AppShell__content stack-6">
            <section class="Card PaymentSummary" data-view="pay">
              <div class="Card__inner stack-4">
                <div class="PaymentSummary__amount">$2,450.00</div>
                <div class="PaymentSummary__sub typo-muted">支付成功后将进入下一审核环节</div>
                <div class="PaymentSummary__rows">
                  <div class="PaymentRow">
                    <div class="PaymentRow__k">服务费</div>
                    <div class="PaymentRow__v">$2,200.00</div>
                  </div>
                  <div class="PaymentRow">
                    <div class="PaymentRow__k">加急费</div>
                    <div class="PaymentRow__v">$250.00</div>
                  </div>
                </div>
                <button class="Btn Btn--primary" type="button" data-action="pay">确认支付</button>
                <a class="Btn Btn--secondary" href="/pages/home/">返回首页</a>
              </div>
            </section>

            <section class="Card PaymentSuccess" data-view="success" hidden>
              <div class="Card__inner stack-4">
                <include src="/components/Chip/Chip.html" data-tone="success" data-label="支付成功"></include>
                <div class="PaymentSuccess__title typo-title">已收到款项</div>
                <div class="PaymentSuccess__sub typo-muted">我们会在 24 小时内完成初审并通知你</div>
                <div class="PaymentSuccess__actions">
                  <a class="Btn Btn--primary" href="/pages/case/">查看进度</a>
                  <a class="Btn Btn--secondary" href="/pages/home/">回到工作台</a>
                </div>
              </div>
            </section>
          </div>
          <include src="/components/BottomTabBar/BottomTabBar.html"></include>
        </div>
      </div>
    </div>
    <script type="module" src="./page.js"></script>
  </body>
</html>
