<div class="tasks-summary-grid grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-4" id="workbenchSidebar" role="navigation" aria-label="工作台视图">
  <button class="task-view-card task-view-card--my-todo is-active" type="button" data-view-id="my-todo" aria-current="true">
    <div class="task-view-card__label"><span class="task-view-card__dot"></span>我的待办</div>
    <div class="task-view-card__value" data-view-count="my-todo">10</div>
    <div class="task-view-card__hint">聚焦当前责任人的待处理与进行中任务，适合作为默认执行入口。</div>
  </button>
  <button class="task-view-card task-view-card--today-due is-inactive" type="button" data-view-id="today-due" aria-current="false">
    <div class="task-view-card__label"><span class="task-view-card__dot"></span>今日到期</div>
    <div class="task-view-card__value" data-view-count="today-due">2</div>
    <div class="task-view-card__hint">优先处理今日需要交付、提交或确认的任务，降低临期积压风险。</div>
  </button>
  <button class="task-view-card task-view-card--overdue is-inactive" type="button" data-view-id="overdue" aria-current="false">
    <div class="task-view-card__label"><span class="task-view-card__dot"></span>已逾期</div>
    <div class="task-view-card__value" data-view-count="overdue">1</div>
    <div class="task-view-card__hint">快速定位已经超期但尚未关闭的任务，适合集中催办与升级处理。</div>
  </button>
  <button class="task-view-card task-view-card--reminder-log is-inactive" type="button" data-view-id="reminder-log" aria-current="false">
    <div class="task-view-card__label"><span class="task-view-card__dot"></span>提醒日志</div>
    <div class="task-view-card__value">4</div>
    <div class="task-view-card__hint">查看提醒发送状态、失败原因与关联任务，方便回溯提醒动作。</div>
  </button>
</div>
