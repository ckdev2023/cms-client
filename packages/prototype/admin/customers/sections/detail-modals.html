<div class="modal-backdrop" id="customerConfirmDialog" aria-hidden="true">
  <div class="apple-modal flex flex-col" role="dialog" aria-modal="true" aria-labelledby="customerConfirmTitle">
    <div class="px-6 py-4 border-b border-[#f2f2f7] flex justify-between items-center bg-white z-10 relative">
      <h3 class="text-[17px] font-semibold text-[var(--apple-text-main)]" id="customerConfirmTitle">确认操作</h3>
      <button class="text-gray-400 hover:text-gray-700 transition-colors p-1" type="button" id="customerConfirmCloseBtn" aria-label="关闭">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
        </svg>
      </button>
    </div>
    <div class="p-6">
      <div class="text-[13px] text-[var(--apple-text-tert)] font-semibold" id="customerConfirmDesc">请确认是否继续。</div>
    </div>
    <div class="px-6 py-4 bg-[#fbfbfd] border-t border-[#f2f2f7] flex justify-end gap-3">
      <button class="btn-secondary px-5" type="button" id="customerConfirmCancelBtn">取消</button>
      <button class="btn-primary px-5" type="button" id="customerConfirmOkBtn">确认</button>
    </div>
  </div>
</div>

<div class="modal-backdrop" id="customerRelationDialog" aria-hidden="true">
  <div class="apple-modal flex flex-col" role="dialog" aria-modal="true" aria-labelledby="customerRelationDialogTitle" style="max-width: 720px;">
    <div class="px-6 py-4 border-b border-[#f2f2f7] flex justify-between items-center bg-white z-10 relative">
      <h3 class="text-[17px] font-semibold text-[var(--apple-text-main)]" id="customerRelationDialogTitle">新增关联人</h3>
      <button class="text-gray-400 hover:text-gray-700 transition-colors p-1" type="button" id="customerRelationCloseBtn" aria-label="关闭">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
        </svg>
      </button>
    </div>
    <div class="p-6 overflow-y-auto" style="max-height: calc(90vh - 130px);">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label class="apple-label" for="customerRelationFieldName">姓名</label>
          <input class="apple-input" type="text" id="customerRelationFieldName" />
        </div>
        <div>
          <label class="apple-label" for="customerRelationFieldKana">フリガナ</label>
          <input class="apple-input" type="text" id="customerRelationFieldKana" />
        </div>
        <div>
          <label class="apple-label" for="customerRelationFieldType">关系</label>
          <select class="apple-input appearance-none" id="customerRelationFieldType"></select>
        </div>
        <div>
          <label class="apple-label" for="customerRelationFieldTags">标签（逗号分隔）</label>
          <input class="apple-input" type="text" id="customerRelationFieldTags" placeholder="例如：配偶, 紧急联系人" />
        </div>
        <div>
          <label class="apple-label" for="customerRelationFieldPhone">电话</label>
          <input class="apple-input" type="tel" inputmode="tel" id="customerRelationFieldPhone" />
        </div>
        <div>
          <label class="apple-label" for="customerRelationFieldEmail">邮箱</label>
          <input class="apple-input" type="email" inputmode="email" id="customerRelationFieldEmail" />
        </div>
        <div class="md:col-span-2">
          <label class="apple-label" for="customerRelationFieldNote">备注</label>
          <input class="apple-input" type="text" id="customerRelationFieldNote" />
          <div class="mt-1 text-[12px] text-[var(--muted-2)] font-semibold">电话/邮箱至少填写一项（用于联系与去重提示）</div>
        </div>
      </div>
      <div class="mt-3 hidden p-3 rounded-xl border border-[#fecaca] bg-[#fef2f2] text-[13px] text-[#991b1b] font-semibold" id="customerRelationError">请检查输入</div>
    </div>
    <div class="px-6 py-4 bg-[#fbfbfd] border-t border-[#f2f2f7] flex justify-end gap-3">
      <button class="btn-secondary px-5" type="button" id="customerRelationCancelBtn">取消</button>
      <button class="btn-primary px-5" type="button" id="customerRelationSaveBtn">保存</button>
    </div>
  </div>
</div>

<div class="modal-backdrop" id="customerCommDialog" aria-hidden="true">
  <div class="apple-modal flex flex-col" role="dialog" aria-modal="true" aria-labelledby="customerCommDialogTitle" style="max-width: 720px;">
    <div class="px-6 py-4 border-b border-[#f2f2f7] flex justify-between items-center bg-white z-10 relative">
      <h3 class="text-[17px] font-semibold text-[var(--apple-text-main)]" id="customerCommDialogTitle">记录沟通</h3>
      <button class="text-gray-400 hover:text-gray-700 transition-colors p-1" type="button" id="customerCommCloseBtn" aria-label="关闭">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
        </svg>
      </button>
    </div>
    <div class="p-6 overflow-y-auto" style="max-height: calc(90vh - 130px);">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label class="apple-label" for="customerCommFieldType">渠道</label>
          <select class="apple-input appearance-none" id="customerCommFieldType"></select>
        </div>
        <div>
          <label class="apple-label" for="customerCommFieldOccurredAt">时间</label>
          <input class="apple-input" type="datetime-local" id="customerCommFieldOccurredAt" />
        </div>
        <div>
          <label class="apple-label" for="customerCommFieldVisibility">可见范围</label>
          <select class="apple-input appearance-none" id="customerCommFieldVisibility"></select>
        </div>
        <div>
          <label class="apple-label" for="customerCommFieldActor">记录人</label>
          <input class="apple-input" type="text" id="customerCommFieldActor" placeholder="例如：Admin / 助理 A" />
        </div>
        <div class="md:col-span-2">
          <label class="apple-label" for="customerCommFieldSummary">摘要</label>
          <input class="apple-input" type="text" id="customerCommFieldSummary" placeholder="例如：确认材料清单与下一步" />
        </div>
        <div class="md:col-span-2">
          <label class="apple-label" for="customerCommFieldDetail">详细记录</label>
          <textarea class="apple-input" id="customerCommFieldDetail" rows="3" placeholder="补充要点、结论、待办..."></textarea>
        </div>
        <div class="md:col-span-2">
          <label class="apple-label" for="customerCommFieldNextAction">下一步动作</label>
          <input class="apple-input" type="text" id="customerCommFieldNextAction" placeholder="例如：3 天后跟进材料、发送清单、预约面谈..." />
          <div class="mt-1 text-[12px] text-[var(--muted-2)] font-semibold">记录本次沟通后的后续动作（可搜索）</div>
        </div>
      </div>
      <div class="mt-3 hidden p-3 rounded-xl border border-[#fecaca] bg-[#fef2f2] text-[13px] text-[#991b1b] font-semibold" id="customerCommError">请检查输入</div>
    </div>
    <div class="px-6 py-4 bg-[#fbfbfd] border-t border-[#f2f2f7] flex justify-end gap-3">
      <button class="btn-secondary px-5" type="button" id="customerCommCancelBtn">取消</button>
      <button class="btn-primary px-5" type="button" id="customerCommSaveBtn">保存</button>
    </div>
  </div>
</div>
