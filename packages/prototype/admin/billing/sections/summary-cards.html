<!--
  section: summary-cards.html
  4 summary cards (global dimension): 总应收 / 总已收 / 总未收 / 逾期欠款
  P0-CONTRACT §6: cards use global aggregation, not "本月".

  demo-only: all amounts are hardcoded from BillingDemoData.DEMO_SUMMARY.
-->
<div class="billing-summary-grid grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-4" id="summaryCards">
  <!-- Card 1: 总应收 -->
  <div class="apple-card billing-summary-card billing-summary-card--due" id="summaryCardTotalDue">
    <div class="billing-summary-card__label"><span class="billing-summary-card__dot"></span>总应收 (JPY)</div>
    <div class="billing-summary-card__value" data-summary="totalDue">¥ 1,650,000</div>
    <div class="billing-summary-card__hint">所有案件应收金额之和<!-- demo-only --></div>
  </div>
  <!-- Card 2: 总已收 -->
  <div class="apple-card billing-summary-card billing-summary-card--received" id="summaryCardTotalReceived">
    <div class="billing-summary-card__label"><span class="billing-summary-card__dot"></span>总已收 (JPY)</div>
    <div class="billing-summary-card__value" data-summary="totalReceived">¥ 555,000</div>
    <div class="billing-summary-card__hint">有效回款记录金额之和<!-- demo-only --></div>
  </div>
  <!-- Card 3: 总未收 -->
  <div class="apple-card billing-summary-card billing-summary-card--outstanding" id="summaryCardTotalOutstanding">
    <div class="billing-summary-card__label"><span class="billing-summary-card__dot"></span>总未收 (JPY)</div>
    <div class="billing-summary-card__value" data-summary="totalOutstanding">¥ 1,095,000</div>
    <div class="billing-summary-card__hint">分布在 5 个案件中<!-- demo-only --></div>
  </div>
  <!-- Card 4: 逾期欠款 (red variant) -->
  <div class="apple-card billing-summary-card billing-summary-card--overdue" id="summaryCardOverdue">
    <div class="billing-summary-card__label"><span class="billing-summary-card__dot"></span>逾期欠款 (JPY)</div>
    <div class="billing-summary-card__value" data-summary="overdueAmount">¥ 500,000</div>
    <div class="billing-summary-card__hint billing-summary-card__hint--alert" data-summary="overdueHint">
      <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
      1 笔逾期款项，需催收<!-- demo-only -->
    </div>
  </div>
</div>
