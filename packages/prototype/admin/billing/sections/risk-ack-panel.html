<!--
  section: risk-ack-panel.html
  Risk acknowledgment panel — confirmation trail for overdue risk acceptance.
  P0-CONTRACT §13.3: confirmedBy, confirmedAt, reasonCode, reasonNote, receipt.

  DOM hooks: #riskAckPanel, #riskAckSummary, #riskAckBy, #riskAckAt,
             #riskAckCase, #riskAckAmount, #riskAckReason, #riskAckNote,
             #riskAckAuditSection, #riskAckAuditLog

  demo-only: data is static from BillingDemoData.DEMO_RISK_ACK.
-->
<div
  id="riskAckPanel"
  class="apple-card overflow-hidden mt-6 hidden"
  role="region"
  aria-label="欠款风险确认留痕"
>
  <div class="px-4 md:px-6 py-4 border-b border-[var(--border)] flex items-center justify-between">
    <div class="flex items-center gap-2">
      <svg class="w-4 h-4 text-[#991b1b]" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path>
      </svg>
      <h2 class="text-[15px] font-extrabold text-[var(--text)]">欠款风险确认留痕</h2>
    </div>
    <button
      class="icon-btn"
      type="button"
      data-action="close-risk-ack"
      aria-label="关闭风险确认面板"
    >
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
      </svg>
    </button>
  </div>

  <div class="px-4 md:px-6 py-4 border-b border-[var(--border)] bg-[rgba(220,38,38,0.04)]" id="riskAckSummary">
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
      <div>
        <div class="text-[12px] font-semibold text-[var(--muted-2)]">确认人</div>
        <div class="text-[14px] font-extrabold text-[var(--text)] mt-0.5" id="riskAckBy">—</div>
      </div>
      <div>
        <div class="text-[12px] font-semibold text-[var(--muted-2)]">确认时间</div>
        <div class="text-[14px] font-extrabold text-[var(--text)] mt-0.5" id="riskAckAt">—</div>
      </div>
      <div>
        <div class="text-[12px] font-semibold text-[var(--muted-2)]">关联案件</div>
        <div class="text-[14px] font-extrabold text-[var(--text)] mt-0.5" id="riskAckCase">—</div>
      </div>
      <div>
        <div class="text-[12px] font-semibold text-[var(--muted-2)]">欠款金额</div>
        <div class="text-[14px] font-extrabold text-[#991b1b] mt-0.5" id="riskAckAmount">—</div>
      </div>
    </div>
  </div>

  <div class="px-4 md:px-6 py-4 border-b border-[var(--border)]">
    <div class="text-[12px] font-semibold text-[var(--muted-2)] mb-1">原因</div>
    <div class="text-[14px] font-semibold text-[var(--text)]" id="riskAckReason">—</div>
    <div class="text-[13px] text-[var(--muted)] mt-1 font-semibold" id="riskAckNote"></div>
  </div>

  <div class="px-4 md:px-6 py-4" id="riskAckAuditSection">
    <div class="text-[12px] font-extrabold text-[var(--muted-2)] uppercase tracking-wider mb-3">审计日志</div>
    <div class="space-y-2" id="riskAckAuditLog"></div>
  </div>
</div>
