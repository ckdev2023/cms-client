<!-- section: sections/group-stats-panel.html -->
<div id="groupStatsPanel" class="mt-4">
  <div class="apple-card p-5 sm:p-6">
    <h3 class="text-[15px] font-bold text-[var(--text)] mb-4">关联统计</h3>

    <dl class="grid grid-cols-2 gap-4" id="statsGrid">
      <!-- Customer count -->
      <div class="rounded-xl border border-[var(--border)] bg-[var(--surface-2)] p-4 text-center">
        <dt class="text-[12px] font-semibold text-[var(--muted-2)] uppercase tracking-wide mb-1">关联客户数</dt>
        <dd class="text-2xl font-extrabold text-[var(--text)]" id="statCustomerCount">—</dd>
      </div>
      <!-- Active case count -->
      <div class="rounded-xl border border-[var(--border)] bg-[var(--surface-2)] p-4 text-center">
        <dt class="text-[12px] font-semibold text-[var(--muted-2)] uppercase tracking-wide mb-1">关联活跃案件数</dt>
        <dd class="text-2xl font-extrabold text-[var(--text)]" id="statCaseCount">—</dd>
      </div>
    </dl>
  </div>
</div>
<!-- /section: sections/group-stats-panel.html -->
