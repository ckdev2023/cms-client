<!--
  Section: detail-header.html
  Purpose: 面包屑、案件标题、阶段 badge、负責人、管轄機構、操作欄、樣本切換
  Contract: P0-CONTRACT-DETAIL.md §1, §3
  Production target: features/case/ui/CaseDetailHeader

  DOM hooks:
    #breadcrumbCaseId, #caseTitle, #caseStatusBadge, #caseStatusDot, #caseStatusText,
    #caseClientName, #caseOwnerName, #caseAgencyName, #caseSampleSelect,
    #btnEditInfo, #btnExportZip, #btnAdvanceStage
-->
<section class="mb-6">
  <div class="meta-text mb-3 flex items-center gap-2">
    <a href="index.html" class="link-apple">案件</a>
    <svg class="w-3 h-3 text-[var(--muted-2)]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
    <span class="font-semibold text-[var(--text)]" id="breadcrumbCaseId">CAS-2026-0142</span>
  </div>
  <div class="flex flex-col gap-4 md:flex-row md:items-end md:justify-between">
    <div>
      <h1 class="page-title flex items-center flex-wrap gap-3">
        <span id="caseTitle">就労ビザ更新（技術・人文知識・国際業務）</span>
        <span id="caseStatusBadge" class="status-badge badge-orange text-[13px]">
          <span id="caseStatusDot" class="w-1.5 h-1.5 rounded-full bg-current"></span>
          <span id="caseStatusText">待提交</span>
        </span>
      </h1>
      <p class="meta-text mt-3 flex items-center flex-wrap gap-4">
        <span class="flex items-center gap-1.5">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path></svg>
          <a href="../customers/index.html" id="caseClientName" class="link-apple">株式会社BlueWave</a>
        </span>
        <span class="text-[var(--border)]">|</span>
        <span class="flex items-center gap-1.5">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
          <span id="caseOwnerName">Suzuki</span>
        </span>
        <span class="text-[var(--border)]">|</span>
        <span class="flex items-center gap-1.5">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 21v-4m0 0V5a2 2 0 012-2h6.5l1 1H21l-3 6 3 6h-8.5l-1-1H5a2 2 0 00-2 2zm9-13.5V9"></path></svg>
          <span id="caseAgencyName">东京入国管理局（品川）</span>
        </span>
      </p>
    </div>
    <div class="flex flex-wrap items-center gap-3">
      <select id="caseSampleSelect" class="apple-input w-auto appearance-none px-4 py-2 text-[13px] font-semibold">
        <option value="work">工作签证（技人国 更新）</option>
        <option value="family">家族滞在（认定）</option>
        <option value="gate-fail">Gate 失败态</option>
        <option value="arrears">欠款继续提交</option>
        <option value="correction">补正处理中</option>
        <option value="biz-material-list-sent">经营管理签 · 已发送资料清单</option>
        <option value="biz-client-material-submitted">经营管理签 · 客户已提交首批资料</option>
        <option value="biz-material-drafting">经营管理签 · 内部资料制作中</option>
        <option value="biz-draft-completed">经营管理签 · 行政书士制作完成</option>
        <option value="biz-client-final-review">经营管理签 · 客户最终确认中</option>
        <option value="biz-manager-final-review">经营管理签 · 负责人最终确认</option>
        <option value="biz-submitted-to-immigration">经营管理签 · 已提交入管</option>
        <option value="biz-immigration-feedback">经营管理签 · 收到入管反馈</option>
        <option value="biz-correction-processing">经营管理签 · 补资料处理中</option>
        <option value="biz-final-payment-pending">经营管理签 · 认定通过待收尾款</option>
        <option value="biz-coe-sent">经营管理签 · COE 已发送</option>
        <option value="biz-visa-applying">经营管理签 · 海外贴签中</option>
        <option value="biz-visa-rejected">经营管理签 · 返签拒签</option>
        <option value="biz-residence-recorded">经营管理签 · 已录入在留期间</option>
        <option value="biz-reminder-scheduled">经营管理签 · 已设置到期提醒</option>
        <option value="archived">S9 已归档只读</option>
      </select>
      <button class="btn-pill flex items-center gap-1.5" type="button" id="btnEditInfo">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
        编辑信息
      </button>
      <button class="btn-pill flex items-center gap-1.5" type="button" id="btnExportZip">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
        导出 ZIP
      </button>
      <button class="btn-primary flex items-center gap-1.5" type="button" id="btnAdvanceStage">
        状态流转
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
      </button>
    </div>
  </div>
</section>
