<!--
  Section: detail-header.html
  Purpose: 面包屑、案件标题、阶段 badge、负責人、管轄機構、操作欄、樣本切換
  Contract: P0-CONTRACT-DETAIL.md §1, §3
  Production target: features/case/ui/CaseDetailHeader

  DOM hooks:
    #breadcrumbCaseId, #caseTitle, #caseStatusBadge, #caseStatusDot, #caseStatusText,
    #caseClientName, #caseOwnerName, #caseAgencyName, #caseSampleSelect,
    #btnEditInfo, #btnExportZip, #btnAdvanceStage
-->
<section class="mb-6">
  <div class="meta-text mb-3 flex items-center gap-2">
    <a href="index.html" class="link-apple">案件</a>
    <svg class="w-3 h-3 text-[var(--muted-2)]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
    <span class="font-semibold text-[var(--text)]" id="breadcrumbCaseId">CAS-2026-0142</span>
  </div>
  <div class="flex flex-col gap-4 md:flex-row md:items-end md:justify-between">
    <div>
      <h1 class="page-title flex items-center flex-wrap gap-3">
        <span id="caseTitle">就労ビザ更新（技術・人文知識・国際業務）</span>
        <span id="caseStatusBadge" class="status-badge badge-orange text-[13px]">
          <span id="caseStatusDot" class="w-1.5 h-1.5 rounded-full bg-current"></span>
          <span id="caseStatusText">待提交</span>
        </span>
      </h1>
      <p class="meta-text mt-3 flex items-center flex-wrap gap-4">
        <!-- client / owner / agency meta -->
      </p>
    </div>
    <div class="flex flex-wrap items-center gap-3">
      <select id="caseSampleSelect" class="apple-input w-auto appearance-none px-4 py-2 text-[13px] font-semibold">
        <option value="work">工作签证（技人国 更新）</option>
        <option value="family">家族滞在（认定）</option>
        <option value="gate-fail">Gate 失败态</option>
        <option value="arrears">欠款继续提交</option>
        <option value="correction">补正处理中</option>
        <option value="archived">S9 已归档只读</option>
      </select>
      <button class="btn-pill flex items-center gap-1.5" type="button" id="btnEditInfo">编辑信息</button>
      <button class="btn-pill flex items-center gap-1.5" type="button" id="btnExportZip">导出 ZIP</button>
      <button class="btn-primary flex items-center gap-1.5" type="button" id="btnAdvanceStage">状态流转</button>
    </div>
  </div>
</section>
