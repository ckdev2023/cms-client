    <!-- section: sections/detail-doc-reference-modal.html (T12: reference existing version) -->
    <div class="modal-backdrop" id="docReferenceModal" style="display: none;">
      <div class="apple-modal flex flex-col" style="max-width: 560px;">
        <div class="px-6 py-4 border-b border-[var(--border)] flex justify-between items-center bg-white z-10 relative rounded-t-[14px]">
          <h3 class="text-[17px] font-semibold text-[var(--text)]">引用既有版本</h3>
          <button class="text-[var(--muted-2)] hover:text-[var(--text)] transition-colors p-1" type="button" data-action="close-doc-reference-modal">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
          </button>
        </div>
        <div class="p-6">
          <p class="text-sm text-[var(--muted)] mb-4" id="docReferenceDocLabel">选择一个已审核通过的版本进行引用，引用后当前资料项状态独立维护。</p>
          <div class="space-y-3" id="docReferenceCandidateList"></div>
          <div class="hidden py-8 text-center" id="docReferenceCandidateEmpty">
            <p class="text-sm text-[var(--muted)]">暂无可引用的已审核版本</p>
            <p class="text-[12px] text-[var(--muted-2)] mt-1">需存在同名资料项、未过期且审核通过的版本</p>
          </div>
        </div>
        <div class="px-6 py-4 bg-[var(--surface-2)] border-t border-[var(--border)] flex justify-end space-x-3 rounded-b-[14px]">
          <button class="btn-secondary px-5" type="button" data-action="close-doc-reference-modal">取消</button>
          <button class="btn-primary px-5" type="button" id="docReferenceConfirmBtn" disabled>确认引用</button>
        </div>
      </div>
    </div>
