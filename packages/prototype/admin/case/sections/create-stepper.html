<section class="wizard-steps mb-8">
  <div class="wizard-step-item is-active" data-step-indicator>
    <div class="wizard-step-index">1</div>
    <div class="mt-3 font-extrabold text-[var(--text)]">业务信息</div>
    <div class="meta-text mt-1">选择模板、申请类型、案件标题</div>
  </div>
  <div class="wizard-step-item" data-step-indicator>
    <div class="wizard-step-index">2</div>
    <div class="mt-3 font-extrabold text-[var(--text)]">关联人与资料</div>
    <div class="meta-text mt-1">绑定主申请人、追加关联人、确认清单</div>
  </div>
  <div class="wizard-step-item" data-step-indicator>
    <div class="wizard-step-index">3</div>
    <div class="mt-3 font-extrabold text-[var(--text)]">分派与期限</div>
    <div class="meta-text mt-1">负责人、截止日、收费与初始动作</div>
  </div>
  <div class="wizard-step-item" data-step-indicator>
    <div class="wizard-step-index">4</div>
    <div class="mt-3 font-extrabold text-[var(--text)]">完成创建</div>
    <div class="meta-text mt-1">复核创建结果与 P0 风险提示</div>
  </div>
</section>
