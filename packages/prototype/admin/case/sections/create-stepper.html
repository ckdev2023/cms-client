<section class="wizard-steps mb-8">
  <div class="wizard-step-item is-active" data-step-indicator>
    <div class="wizard-step-index">1</div>
    <div class="mt-3 font-extrabold text-[var(--text)]">确认业务类型</div>
    <div class="meta-text mt-1">模板、申请类型、案件标题</div>
  </div>
  <div class="wizard-step-item" data-step-indicator>
    <div class="wizard-step-index">2</div>
    <div class="mt-3 font-extrabold text-[var(--text)]">确认主申请人与资料</div>
    <div class="meta-text mt-1">带入客户、补关联人、确认清单</div>
  </div>
  <div class="wizard-step-item" data-step-indicator>
    <div class="wizard-step-index">3</div>
    <div class="mt-3 font-extrabold text-[var(--text)]">确认承接与期限</div>
    <div class="meta-text mt-1">负责人、截止日、收费与初始动作</div>
  </div>
  <div class="wizard-step-item" data-step-indicator>
    <div class="wizard-step-index">4</div>
    <div class="mt-3 font-extrabold text-[var(--text)]">确认并开始办案</div>
    <div class="meta-text mt-1">复核后生成案件</div>
  </div>
</section>
