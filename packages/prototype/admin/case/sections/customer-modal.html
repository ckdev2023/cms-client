<div class="modal-backdrop" id="caseCustomerModal">
  <div class="apple-modal max-w-[640px] border border-[var(--border)]">
    <div class="px-6 py-5 border-b border-[var(--border)] flex items-center justify-between gap-4">
      <div>
        <div class="font-extrabold text-[18px] text-[var(--text)]">新增客户 / 关联人</div>
        <div class="meta-text mt-1">保存后会自动回填到当前案件。</div>
      </div>
      <button class="icon-btn" type="button" aria-label="关闭弹窗" data-close-customer-modal>
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
        </svg>
      </button>
    </div>
    <div class="px-6 py-6 section-stack">
      <form id="caseCustomerModalForm" class="section-stack">
        <input type="hidden" id="caseCustomerModalMode" value="primary" />
        <div class="field-grid two">
          <div>
            <label class="apple-label" for="newCaseCustomerName">姓名</label>
            <input class="apple-input" id="newCaseCustomerName" type="text" placeholder="输入姓名" />
          </div>
          <div>
            <label class="apple-label" for="newCaseCustomerRole">角色</label>
            <select class="apple-input" id="newCaseCustomerRole">
              <option value="主申请人">主申请人</option>
              <option value="配偶">配偶</option>
              <option value="子女">子女</option>
              <option value="扶养者">扶养者</option>
              <option value="保证人">保证人</option>
              <option value="雇主联系人">雇主联系人</option>
            </select>
          </div>
        </div>
        <div class="field-grid two">
          <div>
            <label class="apple-label" for="newCaseCustomerGroup">所属 Group</label>
            <select class="apple-input" id="newCaseCustomerGroup">
              <option value="tokyo-1">东京一组</option>
              <option value="tokyo-2">东京二组</option>
              <option value="osaka">大阪组</option>
            </select>
          </div>
          <div>
            <label class="apple-label" for="newCaseCustomerPhone">电话</label>
            <input class="apple-input" id="newCaseCustomerPhone" type="tel" placeholder="输入电话" />
          </div>
        </div>
        <div>
          <label class="apple-label" for="newCaseCustomerEmail">邮箱</label>
          <input class="apple-input" id="newCaseCustomerEmail" type="email" placeholder="输入邮箱" />
        </div>
        <div>
          <label class="apple-label" for="newCaseCustomerNote">备注</label>
          <textarea class="apple-input min-h-[88px]" id="newCaseCustomerNote" placeholder="例如：与主申请人共用扶养者资料 / 仅做雇主联系人"></textarea>
        </div>
        <div id="caseCustomerDuplicateBox" class="hidden rounded-2xl border border-amber-200 bg-amber-50/70 px-4 py-4 section-stack">
          <div>
            <div class="font-extrabold text-[14px] text-[var(--text)]">发现重复命中（仅提示，不自动复用）</div>
            <div class="meta-text mt-1">若仍继续创建，必须填写原因并确认留痕。</div>
          </div>
          <div id="caseCustomerDuplicateMatches" class="section-stack"></div>
          <div>
            <label class="apple-label" for="caseCustomerDuplicateReason">继续创建原因</label>
            <textarea class="apple-input min-h-[88px]" id="caseCustomerDuplicateReason" placeholder="例如：同名不同人 / 旧档案联系方式已失效"></textarea>
          </div>
        </div>
        <div class="text-[13px] font-semibold text-red-600" id="caseCustomerModalError"></div>
      </form>
    </div>
    <div class="px-6 py-5 border-t border-[var(--border)] flex items-center justify-end gap-2">
      <button class="btn-secondary" type="button" data-close-customer-modal>取消</button>
      <button class="btn-primary" type="button" id="caseCustomerModalSave">保存并回填</button>
    </div>
  </div>
</div>
