<!--
  Section: detail-risk-confirmation.html
  Purpose: 欠款風險確認彈窗（確認人/原因/憑證/時間）
  Contract: P0-CONTRACT-DETAIL.md §15
  Production target: features/case/ui/RiskConfirmationModal

  DOM hooks: #riskConfirmModal, #riskConfirmReason, #riskConfirmPerson,
             #riskConfirmEvidence, #riskConfirmSubmit, [data-close-risk-modal]
  Trigger: #triggerRiskConfirm button in validation tab
-->
<div class="modal-backdrop" id="riskConfirmModal">
  <div class="apple-modal max-w-[540px] border border-[var(--border)]">
    <div class="px-6 py-5 border-b border-[var(--border)]">
      <div class="font-extrabold text-[18px] text-[var(--text)]">欠款风险确认</div>
      <div class="meta-text mt-1">当前案件存在未结清费用。确认后将留痕并允许继续提交。</div>
    </div>
    <div class="px-6 py-6 section-stack">
      <div>
        <label class="apple-label" for="riskConfirmReason">确认原因</label>
        <textarea class="apple-input min-h-[88px]" id="riskConfirmReason" placeholder="说明为何在欠款状态下继续提交"></textarea>
      </div>
      <div>
        <label class="apple-label" for="riskConfirmPerson">确认人</label>
        <input class="apple-input" id="riskConfirmPerson" type="text" placeholder="输入确认人姓名" />
      </div>
      <div>
        <label class="apple-label" for="riskConfirmEvidence">凭证</label>
        <input class="apple-input" id="riskConfirmEvidence" type="text" placeholder="附件名称或说明（如：客户付款承诺书.pdf）" />
        <div class="meta-text mt-1">支持上传截图、邮件、付款承诺书等佐证材料（原型仅录入说明）</div>
      </div>
    </div>
    <div class="px-6 py-5 border-t border-[var(--border)] flex items-center justify-end gap-2">
      <button class="btn-secondary" type="button" data-close-risk-modal>取消</button>
      <button class="btn-primary" type="button" id="riskConfirmSubmit">确认并继续提交</button>
    </div>
  </div>
</div>

<!--
  Section: COE 发送風險確認彈窗（尾款未收时发送 COE 的確認人/原因/憑證/時間）
  Contract: P0 — waiting_final_payment → coe_sent 门控
  Production target: features/case/ui/CoeRiskConfirmationModal

  DOM hooks: #coeRiskConfirmModal, #coeRiskOutstandingAmount, #coeRiskReason,
             #coeRiskPerson, #coeRiskEvidence, #coeRiskConfirmSubmit,
             [data-close-coe-risk-modal]
  Trigger: _openCoeRiskModal() in case-detail-stage-actions-post-approval.js
-->
<div class="modal-backdrop" id="coeRiskConfirmModal">
  <div class="apple-modal max-w-[540px] border border-[var(--border)]">
    <div class="px-6 py-5 border-b border-[var(--border)]">
      <div class="font-extrabold text-[18px] text-[var(--text)]">COE 发送 · 尾款未收风险确认</div>
      <div class="meta-text mt-1">尾款尚未结清，发送 COE 前需确认风险并留痕。</div>
    </div>
    <div class="px-6 py-6 section-stack">
      <div class="p-3 rounded-xl border border-amber-200 bg-amber-50/40">
        <div class="text-[13px] text-amber-700 font-semibold">未结清金额：<span id="coeRiskOutstandingAmount">—</span></div>
      </div>
      <div>
        <label class="apple-label" for="coeRiskReason">确认原因 <span class="text-[var(--danger)]">*</span></label>
        <textarea class="apple-input min-h-[88px]" id="coeRiskReason" placeholder="说明为何在尾款未收状态下发送 COE"></textarea>
      </div>
      <div>
        <label class="apple-label" for="coeRiskPerson">确认人</label>
        <input class="apple-input" id="coeRiskPerson" type="text" placeholder="输入确认人姓名" />
      </div>
      <div>
        <label class="apple-label" for="coeRiskEvidence">凭证</label>
        <input class="apple-input" id="coeRiskEvidence" type="text" placeholder="附件名称或说明（如：客户付款承诺书.pdf）" />
        <div class="meta-text mt-1">支持上传截图、邮件、付款承诺书等佐证材料（原型仅录入说明）</div>
      </div>
    </div>
    <div class="px-6 py-5 border-t border-[var(--border)] flex items-center justify-end gap-2">
      <button class="btn-secondary" type="button" data-close-coe-risk-modal>取消</button>
      <button class="btn-primary" type="button" id="coeRiskConfirmSubmit">确认风险并发送 COE</button>
    </div>
  </div>
</div>
