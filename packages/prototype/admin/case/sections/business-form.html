<section class="apple-card p-6 md:p-8 section-stack" data-step-panel>
  <div>
    <div class="section-kicker">Step 1</div>
    <div class="section-title mt-2">确认业务类型</div>
    <div class="meta-text mt-2">先选模板与申请类型；锁定主申请人后，Group 会在下一步自动继承到承接设置。</div>
  </div>

  <div class="template-grid">
    <button class="template-card text-left is-active" type="button" data-template-card="family">
      <div class="flex items-center justify-between gap-3">
        <div class="text-[16px] font-extrabold text-[var(--text)]">家族滞在</div>
        <span class="chip">常用模板</span>
      </div>
      <div class="meta-text mt-2">适合配偶/子女批量建案，自动展开扶养者/保证人资料。</div>
    </button>
    <button class="template-card text-left" type="button" data-template-card="work">
      <div class="flex items-center justify-between gap-3">
        <div class="text-[16px] font-extrabold text-[var(--text)]">技人国</div>
        <span class="chip">常用模板</span>
      </div>
      <div class="meta-text mt-2">适合雇主/职位信息驱动的工作类建案，自动带出雇主资料区块。</div>
    </button>
  </div>
  <div class="meta-text">当前向导先覆盖常用模板；如需补充更细的企业案件字段，可在开始办案后到案件详情继续完善。</div>

  <div>
    <label class="apple-label" for="applicationTypeSelect">申请类型</label>
    <select class="apple-input" id="applicationTypeSelect"></select>
  </div>

  <div>
    <label class="apple-label" for="caseNameInput" id="caseNameLabel">案件标题</label>
    <input class="apple-input" id="caseNameInput" type="text" />
    <div class="meta-text mt-2" id="caseNameHint">默认由“主申请人 + 模板 + 申请类型”生成，也支持手动改名。</div>
  </div>
</section>
