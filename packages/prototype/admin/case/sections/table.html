<section class="apple-card overflow-hidden">
  <div
    id="bulkActionBar"
    class="hidden px-4 md:px-6 py-3 border-b border-[#f2f2f7] bg-[#fbfbfd] flex flex-col gap-3"
    role="region"
    aria-label="批量操作"
  >
    <div class="flex flex-col gap-2 xl:flex-row xl:items-center xl:justify-between">
      <div class="flex items-center gap-2 text-[13px] font-extrabold text-[var(--text)]">
        已选择 <span id="selectedCount">0</span> 条
        <button class="text-[12px] font-extrabold text-[var(--muted-2)] hover:text-[var(--text)]" type="button" id="bulkClearBtn">
          清除
        </button>
      </div>
      <div class="table-meta">批量能力用于负责人/协作者调整、统一截止日与生成催办任务。</div>
    </div>
    <div class="flex flex-wrap items-center gap-2">
      <select class="apple-input appearance-none bg-white h-9 py-0 px-3 text-[13px] font-semibold w-[160px]" id="bulkOwnerSelect">
        <option value="" selected>批量指派负责人</option>
        <option value="suzuki">Suzuki</option>
        <option value="tanaka">Tanaka</option>
        <option value="li">Li</option>
        <option value="sato">Sato</option>
      </select>
      <button class="btn-secondary h-9 px-4 text-[13px]" type="button" id="bulkOwnerApplyBtn">应用</button>
      <select class="apple-input appearance-none bg-white h-9 py-0 px-3 text-[13px] font-semibold w-[180px]" id="bulkCollaboratorSelect">
        <option value="" selected>批量指派协作者</option>
        <option value="assistant-a">助理 A</option>
        <option value="assistant-b">助理 B</option>
        <option value="finance">财务</option>
      </select>
      <button class="btn-secondary h-9 px-4 text-[13px]" type="button" id="bulkCollaboratorApplyBtn">应用</button>
      <input class="apple-input bg-white h-9 py-0 px-3 text-[13px] font-semibold w-[160px]" type="date" id="bulkDueDateInput" />
      <button class="btn-secondary h-9 px-4 text-[13px]" type="button" id="bulkDueDateApplyBtn">调整截止日</button>
      <select class="apple-input appearance-none bg-white h-9 py-0 px-3 text-[13px] font-semibold w-[170px]" id="bulkTaskSelect">
        <option value="" selected>批量生成任务</option>
        <option value="催办">催办</option>
        <option value="补正">补正</option>
        <option value="跟进">跟进</option>
      </select>
      <button class="btn-secondary h-9 px-4 text-[13px]" type="button" id="bulkTaskApplyBtn">生成</button>
    </div>
  </div>

  <div class="overflow-x-auto">
    <table class="apple-table w-full text-left border-collapse min-w-[1480px]">
      <thead>
        <tr>
          <th class="w-[48px] text-center">
            <input type="checkbox" id="selectAllCases" class="accent-[var(--primary)] table-checkbox" aria-label="全选案件" />
          </th>
          <th class="min-w-[220px]">案件编号 / 名称</th>
          <th class="min-w-[120px]">案件类型</th>
          <th class="min-w-[120px]">主申请人</th>
          <th class="min-w-[110px]">Group</th>
          <th class="min-w-[130px]">当前阶段</th>
          <th class="min-w-[110px]">负责人</th>
          <th class="min-w-[180px]">资料完成率</th>
          <th class="min-w-[180px]">最新校验</th>
          <th class="min-w-[120px] text-right">未收金额</th>
          <th class="min-w-[130px]">最近更新</th>
          <th class="min-w-[120px]">截止日</th>
          <th class="min-w-[100px]">风险状态</th>
          <th class="min-w-[72px] text-right">操作</th>
        </tr>
      </thead>
      <tbody id="caseTableBody"></tbody>
    </table>
  </div>

  <div class="px-6 py-4 border-t border-gray-100 flex flex-col gap-3 md:flex-row md:items-center md:justify-between">
    <div class="text-sm text-gray-500" id="paginationSummary">显示 0 条</div>
    <div class="flex space-x-2">
      <button class="px-3 py-1 border border-gray-200 rounded text-sm text-gray-400 cursor-not-allowed" type="button">上一页</button>
      <button class="px-3 py-1 border border-gray-200 rounded text-sm text-gray-400 cursor-not-allowed" type="button">下一页</button>
    </div>
  </div>
</section>
