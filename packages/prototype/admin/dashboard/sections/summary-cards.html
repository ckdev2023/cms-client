<section class="summary-grid">
  <article class="apple-card summary-card" data-card-id="todayTasks" data-tone="info">
    <div class="summary-card-orb" aria-hidden="true"></div>
    <div class="summary-card-head">
      <div class="summary-card-body">
        <div class="summary-card-label">今日待办</div>
        <div class="summary-card-value" data-card-value>0</div>
      </div>
      <span class="status-pill status-info">核心动作</span>
    </div>
    <p class="summary-card-helper" data-card-helper>今日必须处理的任务、跟进与催办。</p>
  </article>

  <article class="apple-card summary-card" data-card-id="upcomingCases" data-tone="warn">
    <div class="summary-card-orb" aria-hidden="true"></div>
    <div class="summary-card-head">
      <div class="summary-card-body">
        <div class="summary-card-label">即将到期案件</div>
        <div class="summary-card-value" data-card-value>0</div>
      </div>
      <span class="status-pill status-warn">临近到期</span>
    </div>
    <p class="summary-card-helper" data-card-helper>近期需要优先跟进的案件。</p>
  </article>

  <article class="apple-card summary-card" data-card-id="pendingDocuments" data-tone="success">
    <div class="summary-card-orb" aria-hidden="true"></div>
    <div class="summary-card-head">
      <div class="summary-card-body">
        <div class="summary-card-label">待补件案件</div>
        <div class="summary-card-value" data-card-value>0</div>
      </div>
      <span class="status-pill status-muted">资料清单</span>
    </div>
    <p class="summary-card-helper" data-card-helper>有缺件或退回补正，需继续推进。</p>
  </article>

  <article class="apple-card summary-card" data-card-id="pendingSubmissions" data-tone="info">
    <div class="summary-card-orb" aria-hidden="true"></div>
    <div class="summary-card-head">
      <div class="summary-card-body">
        <div class="summary-card-label">待提交案件</div>
        <div class="summary-card-value" data-card-value>0</div>
      </div>
      <span class="status-pill status-info">可继续提交</span>
    </div>
    <p class="summary-card-helper" data-card-helper>资料和校验已通过，可继续复核与提交。</p>
  </article>

  <article class="apple-card summary-card" data-card-id="inReview" data-tone="review">
    <div class="summary-card-orb" aria-hidden="true"></div>
    <div class="summary-card-head">
      <div class="summary-card-body">
        <div class="summary-card-label">审理中案件</div>
        <div class="summary-card-value" data-card-value>0</div>
      </div>
      <span class="status-pill status-muted">等待结果</span>
    </div>
    <p class="summary-card-helper" data-card-helper>已提交等待结果，重点关注回执与补正期限。</p>
  </article>

  <article class="apple-card summary-card" data-card-id="pendingBilling" data-tone="billing">
    <div class="summary-card-orb" aria-hidden="true"></div>
    <div class="summary-card-head">
      <div class="summary-card-body">
        <div class="summary-card-label">待回款案件</div>
        <div class="summary-card-value" data-card-value>0</div>
      </div>
      <span class="status-pill status-warn">收费节点</span>
    </div>
    <p class="summary-card-helper" data-card-helper>收费节点已到但未结清，优先登记回款。</p>
  </article>

  <article class="apple-card summary-card" data-card-id="riskCases" data-tone="risk">
    <div class="summary-card-orb" aria-hidden="true"></div>
    <div class="summary-card-head">
      <div class="summary-card-body">
        <div class="summary-card-label">风险案件</div>
        <div class="summary-card-value" data-card-value>0</div>
      </div>
      <span class="status-pill status-danger">优先处理</span>
    </div>
    <p class="summary-card-helper" data-card-helper>硬阻断、逾期资料、补正临近到期或欠款风险。</p>
  </article>
</section>
