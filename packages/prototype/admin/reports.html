<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gyosei OS - 报表 (Reports)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @font-face {
            font-family: 'SF Pro Display';
            src: url('https://applesocial.s3.amazonaws.com/assets/fonts/sanfrancisco/sanfranciscodisplay-regular-webfont.woff2') format('woff2');
            font-weight: 400;
            font-style: normal;
        }
        @font-face {
            font-family: 'SF Pro Display';
            src: url('https://applesocial.s3.amazonaws.com/assets/fonts/sanfrancisco/sanfranciscodisplay-semibold-webfont.woff2') format('woff2');
            font-weight: 600;
            font-style: normal;
        }
        @font-face {
            font-family: 'SF Pro Text';
            src: url('https://applesocial.s3.amazonaws.com/assets/fonts/sanfrancisco/sanfranciscotext-regular-webfont.woff2') format('woff2');
            font-weight: 400;
            font-style: normal;
        }
        @font-face {
            font-family: 'SF Pro Text';
            src: url('https://applesocial.s3.amazonaws.com/assets/fonts/sanfrancisco/sanfranciscotext-medium-webfont.woff2') format('woff2');
            font-weight: 500;
            font-style: normal;
        }
        
        :root {
            --apple-blue: #0071e3;
            --apple-blue-hover: #0077ED;
            --apple-link: #0066cc;
            --apple-bg: #f5f5f7;
            --apple-card: #ffffff;
            --apple-text-main: #1d1d1f;
            --apple-text-sec: rgba(0, 0, 0, 0.8);
            --apple-text-tert: rgba(0, 0, 0, 0.48);
            --apple-shadow: rgba(0, 0, 0, 0.08) 0px 4px 20px 0px;
            --apple-shadow-hover: rgba(0, 0, 0, 0.12) 0px 8px 30px 0px;
        }

        body {
            font-family: 'SF Pro Text', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--apple-bg);
            color: var(--apple-text-main);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            letter-spacing: -0.02em;
        }

        h1, h2, h3, h4, .display-font {
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            letter-spacing: -0.02em;
        }

        .text-hero {
            font-size: 40px;
            font-weight: 600;
            line-height: 1.1;
            letter-spacing: -0.01em;
        }

        .glass-nav {
            background-color: rgba(0, 0, 0, 0.8);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
        }

        .btn-primary {
            background-color: var(--apple-blue);
            color: white;
            padding: 8px 15px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 400;
            transition: all 0.2s ease;
        }
        .btn-primary:hover {
            background-color: var(--apple-blue-hover);
        }

        .btn-pill {
            color: var(--apple-link);
            padding: 6px 16px;
            border-radius: 980px;
            font-size: 14px;
            background: transparent;
            border: 1px solid var(--apple-link);
            transition: all 0.2s ease;
        }
        .btn-pill:hover {
            background-color: var(--apple-link);
            color: white;
        }

        .apple-card {
            background-color: var(--apple-card);
            border-radius: 12px;
            box-shadow: var(--apple-shadow);
            transition: box-shadow 0.3s ease, transform 0.3s ease;
            border: none;
        }
        .apple-card:hover {
            box-shadow: var(--apple-shadow-hover);
            transform: translateY(-2px);
        }
    </style>
</head>
<body class="antialiased min-h-screen flex flex-col">

    <nav class="glass-nav fixed w-full top-0 z-50 h-12 flex items-center">
        <div class="max-w-6xl mx-auto px-4 w-full flex justify-between items-center">
            <div class="flex items-center space-x-8">
                <a href="admin-prototype.html" class="text-white display-font font-semibold text-lg tracking-tight hover:opacity-80 transition-opacity">Gyosei OS</a>
                <div class="hidden md:flex space-x-6 overflow-x-auto">
                    <a href="admin-prototype.html" class="text-white/60 text-xs hover:text-white transition-colors whitespace-nowrap">仪表盘 (Dashboard)</a>
                    <a href="customers.html" class="text-white/60 text-xs hover:text-white transition-colors whitespace-nowrap">客户 (Customers)</a>
                    <a href="cases-list.html" class="text-white/60 text-xs hover:text-white transition-colors whitespace-nowrap">案件 (Cases)</a>
                    <a href="documents.html" class="text-white/60 text-xs hover:text-white transition-colors whitespace-nowrap">资料中心 (Docs)</a>
                    <a href="forms.html" class="text-white/60 text-xs hover:text-white transition-colors whitespace-nowrap">文书中心 (Forms)</a>
                    <a href="tasks.html" class="text-white/60 text-xs hover:text-white transition-colors whitespace-nowrap">任务与提醒 (Tasks)</a>
                    <a href="billing.html" class="text-white/60 text-xs hover:text-white transition-colors whitespace-nowrap">收费与财务 (Billing)</a>
                    <a href="reports.html" class="text-white/90 text-xs hover:text-white transition-colors whitespace-nowrap">报表 (Reports)</a>
                    <a href="settings.html" class="text-white/60 text-xs hover:text-white transition-colors whitespace-nowrap">设置 (Settings)</a>
                    <a href="../src/index.html" target="_blank" class="text-white/60 text-xs hover:text-white transition-colors whitespace-nowrap">客户门户 (Portal)</a>
                </div>
            </div>
            <div class="flex items-center space-x-4">
                <button class="text-white/80 hover:text-white transition-colors">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                </button>
                <div class="w-6 h-6 rounded-full bg-white/20 flex items-center justify-center text-white text-xs">AD</div>
            </div>
        </div>
    </nav>

    <main class="flex-grow pt-24 pb-20 px-4 md:px-8 max-w-6xl mx-auto w-full">
        <header class="mb-12 flex justify-between items-end">
            <div>
                <h1 class="text-hero mb-2">报表 (Reports)</h1>
                <p class="text-[17px] text-[#86868b] display-font">事务所业务数据分析与统计。</p>
            </div>
            <div class="flex space-x-3">
                <button class="btn-pill">导出报告</button>
            </div>
        </header>

        <section class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-12">
            <div class="apple-card p-8 h-64 flex flex-col justify-center items-center">
                <div class="text-[#86868b] mb-4">
                    <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                </div>
                <h3 class="text-lg font-semibold mb-2">案件数量统计</h3>
                <p class="text-sm text-[#86868b]">按案件类型、状态分布的统计图表</p>
            </div>
            <div class="apple-card p-8 h-64 flex flex-col justify-center items-center">
                <div class="text-[#86868b] mb-4">
                    <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                </div>
                <h3 class="text-lg font-semibold mb-2">财务收入分析</h3>
                <p class="text-sm text-[#86868b]">应收与实收金额对比图表</p>
            </div>
            <div class="apple-card p-8 h-64 flex flex-col justify-center items-center">
                <div class="text-[#86868b] mb-4">
                    <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                </div>
                <h3 class="text-lg font-semibold mb-2">平均办结时长</h3>
                <p class="text-sm text-[#86868b]">各阶段流转效率分析</p>
            </div>
            <div class="apple-card p-8 h-64 flex flex-col justify-center items-center">
                <div class="text-[#86868b] mb-4">
                    <svg class="w-12 h-12" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                </div>
                <h3 class="text-lg font-semibold mb-2">案件来源转化率</h3>
                <p class="text-sm text-[#86868b]">咨询线索转化为案件的漏斗图</p>
            </div>
        </section>
    </main>
</body>
</html>
