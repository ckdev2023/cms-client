<!--
  section: filters.html
  Scope segmented control + search + select filters (status, owner, group, businessType)
  + date range (follow-up time) + reset button.
  P0-CONTRACT §3
-->
<div class="flex flex-col gap-3 mb-6">
  <div class="flex flex-wrap justify-between items-center gap-3">
    <div class="flex flex-wrap items-center gap-3">
      <div class="segmented-control" role="group" aria-label="数据范围">
        <button class="segment-btn active" type="button" data-scope-btn="mine" aria-pressed="true">我的</button>
        <button class="segment-btn" type="button" data-scope-btn="group" aria-pressed="false">本组</button>
        <button class="segment-btn" type="button" data-scope-btn="all" aria-pressed="false">全所（管理员）</button>
      </div>
    </div>
    <div class="relative">
      <svg class="w-4 h-4 absolute left-3 top-2.5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
      <input type="text" id="leadSearch" placeholder="搜索：姓名 / 电话 / 邮箱 / 编号" class="search-input" />
    </div>
  </div>
  <div class="flex flex-wrap items-center gap-2">
    <select id="filterStatus" class="apple-input appearance-none bg-white h-9 py-0 px-3 text-[13px] font-semibold w-[140px] leads-filter-select">
      <option value="" selected>状态：全部</option>
      <option value="new">新咨询</option>
      <option value="following">跟进中</option>
      <option value="pending_sign">待签约</option>
      <option value="signed">已签约</option>
      <option value="lost">已流失</option>
    </select>
    <select id="filterOwner" class="apple-input appearance-none bg-white h-9 py-0 px-3 text-[13px] font-semibold w-[150px] leads-filter-select">
      <option value="" selected>负责人：全部</option>
      <option value="suzuki">Suzuki</option>
      <option value="tanaka">Tanaka</option>
      <option value="sato">Sato</option>
    </select>
    <select id="filterGroup" class="apple-input appearance-none bg-white h-9 py-0 px-3 text-[13px] font-semibold w-[150px] leads-filter-select">
      <option value="" selected>Group：全部</option>
      <option value="tokyo-1">东京一组</option>
      <option value="tokyo-2">东京二组</option>
      <option value="osaka">大阪组</option>
    </select>
    <select id="filterBusinessType" class="apple-input appearance-none bg-white h-9 py-0 px-3 text-[13px] font-semibold w-[150px] leads-filter-select">
      <option value="" selected>业务类型：全部</option>
      <option value="highly-skilled">高度人才</option>
      <option value="work-visa">技人国</option>
      <option value="family-stay">家族滞在</option>
      <option value="business-manager">设立法人</option>
      <option value="permanent">永住</option>
      <option value="other">其他</option>
    </select>
    <div class="flex items-center gap-1">
      <span class="text-[12px] font-semibold text-[var(--apple-text-tert)] whitespace-nowrap">跟进</span>
      <input type="date" id="filterDateFrom" class="apple-input appearance-none bg-white h-9 py-0 px-2 text-[13px] font-semibold w-[130px]" />
      <span class="text-[12px] text-[var(--apple-text-tert)]">—</span>
      <input type="date" id="filterDateTo" class="apple-input appearance-none bg-white h-9 py-0 px-2 text-[13px] font-semibold w-[130px]" />
    </div>
    <button class="btn-secondary h-9 px-4 text-[13px]" type="button" data-action="reset-filters">重置</button>
  </div>
</div>
