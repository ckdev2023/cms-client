<!--
  section: toast.html
  Shared toast feedback component.
  Loaded into index.html via data-include-html fragment (outside <main>, overlay).
  P0-CONTRACT §6, §11

  Presets (from data/leads-config.js TOASTS):
    - leadCreated       已创建（示例） / 新线索已添加到列表
    - contactMissing    无法创建 / 请至少填写电话或邮箱
    - nameMissing       无法创建 / 请填写联系人姓名
    - bulkAssign        批量指派负责人（示例） / ...
    - bulkFollowUp      批量调整跟进时间（示例） / ...
    - bulkStatus        批量标记状态（示例） / ...
    - dedupHit          检测到可能重复 / ...
    - dedupViewRecord   查看已有记录（示例） / ...
    - resetFilters      已重置 / 所有筛选条件已恢复默认
    - conversionSuccess 转化成功（示例） / ...
    - detailUnavailable 详情页（示例） / 跳转到详情页查看线索全貌
-->
<div data-section="toast" id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 hidden z-[999]" role="status" aria-live="polite" aria-atomic="true">
  <div class="px-4 py-3 rounded-2xl border border-[var(--border)] bg-white shadow-[var(--shadow)]">
    <div class="text-[13px] font-extrabold text-[var(--text)]" id="toastTitle">已保存</div>
    <div class="text-[12px] text-[var(--muted-2)] font-semibold mt-0.5" id="toastDesc">操作已完成</div>
  </div>
</div>
