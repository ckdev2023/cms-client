<!--
  section: detail-warning-banner
  Signed-but-not-converted warning banner: amber bg + warning icon + "已签约未转化" message.
  Hidden by default; made visible via .is-visible by leads-detail-page.js when sample.banner === 'signed'.
  Contains #warningConvertBtn button that triggers conversion flow.
-->
<div class="warning-banner mb-4" id="warningBanner" role="status">
  <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
  <span class="flex-1" id="warningBannerText">该线索已签约，下一步请直接开始建档并创建首个案件。</span>
  <button class="btn-primary px-3 py-1 text-[12px]" type="button" id="warningConvertBtn">签约并开始建档</button>
</div>
