<!--
  section: detail-header
  Breadcrumb + title + owner/group + sample switcher + actions.
-->
<section class="mb-6" id="detailHeaderSection">
  <div class="text-[13px] font-semibold text-[var(--muted-2)] mb-3 flex items-center gap-2">
    <a href="index.html" class="link-apple">咨询线索</a>
    <svg class="w-3 h-3 text-[var(--muted-2)]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
    <span class="font-semibold text-[var(--text)]" id="breadcrumbName">李华</span>
  </div>

  <div class="flex flex-col gap-4 md:flex-row md:items-start md:justify-between">
    <div>
      <h1 class="text-[32px] font-extrabold leading-tight tracking-[-0.03em] flex items-center flex-wrap gap-3">
        <span id="detailTitle">李华</span>
        <span id="detailStatusBadge" class="lead-badge lead-badge-following text-[13px]">跟进中</span>
      </h1>
      <p class="text-[13px] font-semibold text-[var(--muted-2)] mt-2 flex items-center flex-wrap gap-4">
        <span class="font-mono text-[12px]" id="detailLeadId">LEAD-2026-0035</span>
        <span class="text-[var(--border)]">|</span>
        <span class="flex items-center gap-1.5">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
          <span id="detailOwner" class="flex items-center gap-1.5">
            <span class="w-5 h-5 rounded-full bg-emerald-100 text-emerald-700 text-[10px] flex items-center justify-center font-bold" id="detailOwnerAvatar">T</span>
            <span id="detailOwnerName">田中</span>
          </span>
        </span>
        <span class="text-[var(--border)]">|</span>
        <span class="flex items-center gap-1.5">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
          <span class="chip" id="detailGroup">东京一组</span>
        </span>
      </p>
    </div>

    <div class="flex flex-col sm:flex-row items-start sm:items-center gap-3 flex-shrink-0">
      <select id="leadSampleSelect" class="apple-input w-auto appearance-none px-4 py-2 text-[13px] font-semibold">
        <option value="following">正常跟进</option>
        <option value="lost">已流失</option>
        <option value="signed">已签约，待建档</option>
        <option value="converted-customer">已建客户档案</option>
        <option value="converted-case">已创建案件</option>
        <option value="dedup-lead">发现重复咨询（电话）</option>
        <option value="dedup-customer">发现重复客户（邮箱）</option>
        <option value="empty-followups">暂无跟进记录</option>
      </select>
      <div class="flex items-center gap-2 flex-wrap" id="detailActions">
        <button class="btn-secondary px-3 py-1.5 text-[13px]" type="button" id="btnEditInfo">编辑信息</button>
        <button class="btn-secondary px-3 py-1.5 text-[13px]" type="button" id="btnChangeStatus">调整状态</button>
        <button class="btn-primary px-3 py-1.5 text-[13px]" type="button" id="btnConvertCase">签约并开始建档</button>
        <button class="btn-secondary px-3 py-1.5 text-[13px]" type="button" id="btnConvertCustomer">仅转客户</button>
        <button class="btn-secondary px-3 py-1.5 text-[13px] text-red-600 border-red-200 hover:bg-red-50" type="button" id="btnMarkLost">标记流失</button>
      </div>
    </div>
  </div>
</section>
