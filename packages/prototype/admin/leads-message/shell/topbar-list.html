<header class="topbar" aria-label="顶部工具栏">
  <div class="topbar-inner">
    <button class="icon-btn lg:hidden" type="button" aria-label="打开导航" data-nav-open>
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
    </button>
    <div class="search" role="search">
      <svg class="w-[18px] h-[18px] text-[var(--muted-2)]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
      <input type="search" placeholder="搜索：客户 / 案件 / 资料 / 文书..." aria-label="全局搜索" />
      <span class="hidden sm:inline-flex chip">⌘K</span>
    </div>
    <button class="btn-pill hidden sm:inline-flex" type="button" id="topbarAddLead">新建线索</button>
    <button class="btn-primary" type="button" data-navigate="../case/create.html">新建案件</button>
    <div class="w-9 h-9 rounded-full bg-[var(--surface)] border border-[var(--border)] flex items-center justify-center text-[13px] font-extrabold text-[var(--text)]">AD</div>
  </div>
</header>
