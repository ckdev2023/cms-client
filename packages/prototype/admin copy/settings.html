    <style>
        @import url("https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap");

        :root {
            --bg: #f8fafc;
            --surface: #ffffff;
            --surface-2: #f1f5f9;
            --border: #e2e8f0;
            --text: #0f172a;
            --muted: #475569;
            --muted-2: #64748b;
            --primary: #0369a1;
            --primary-hover: #075985;
            --shadow: 0 1px 2px rgba(15, 23, 42, 0.06),
              0 10px 28px rgba(15, 23, 42, 0.08);
            --shadow-hover: 0 2px 3px rgba(15, 23, 42, 0.07),
              0 16px 36px rgba(15, 23, 42, 0.10);
            --radius: 14px;

            --apple-blue: var(--primary);
            --apple-blue-hover: var(--primary-hover);
            --apple-link: var(--primary);
            --apple-bg: var(--bg);
            --apple-card: var(--surface);
            --apple-text-main: var(--text);
            --apple-text-sec: var(--muted);
            --apple-text-tert: var(--muted-2);
            --apple-shadow: var(--shadow);
            --apple-shadow-hover: var(--shadow-hover);
        }

        body {
            font-family:
              "Plus Jakarta Sans",
              -apple-system,
              BlinkMacSystemFont,
              "Segoe UI",
              Roboto,
              Helvetica,
              Arial,
              sans-serif;
            background-color: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            letter-spacing: -0.01em;
        }

        .display-font { font-weight: 900; letter-spacing: -0.02em; }

        .text-hero { font-size: 40px; font-weight: 900; line-height: 1.1; letter-spacing: -0.02em; }

        .skip-link {
            position: absolute;
            left: 16px;
            top: 8px;
            transform: translateY(-200%);
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 8px 12px;
            box-shadow: var(--shadow);
            z-index: 1000;
        }
        .skip-link:focus { transform: translateY(0); }

        :where(a, button, input, select, textarea):focus-visible {
            outline: 2px solid rgba(3, 105, 161, 0.35);
            outline-offset: 2px;
        }

        .app-shell { min-height: 100vh; display: grid; grid-template-columns: 1fr; }
        @media (min-width: 1024px) {
            .app-shell { grid-template-columns: 280px 1fr; }
        }

        .side-nav { background: var(--surface); border-right: 1px solid var(--border); }
        .side-nav-inner { height: 100vh; position: sticky; top: 0; display: flex; flex-direction: column; padding: 14px; gap: 14px; }
        .brand { display: flex; align-items: center; justify-content: space-between; gap: 12px; padding: 10px 10px 6px 10px; }
        .brand-title { font-size: 15px; font-weight: 900; letter-spacing: -0.02em; }

        .nav-group-title { font-size: 11px; color: var(--muted-2); font-weight: 900; text-transform: uppercase; letter-spacing: 0.08em; padding: 10px 10px 6px 10px; }
        .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 10px; border-radius: 12px; color: var(--muted); font-size: 14px; font-weight: 800; transition: background-color 160ms ease, color 160ms ease; }
        .nav-item:hover { background: var(--surface-2); color: var(--text); }
        .nav-item[aria-current="page"] { background: rgba(3, 105, 161, 0.1); color: var(--text); }
        .nav-item svg { width: 18px; height: 18px; flex: 0 0 auto; }

        .topbar { position: sticky; top: 0; z-index: 40; background: rgba(248, 250, 252, 0.92); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border-bottom: 1px solid var(--border); }
        .topbar-inner { max-width: 1280px; margin: 0 auto; padding: 14px 16px; display: flex; align-items: center; gap: 12px; }

        .icon-btn { width: 38px; height: 38px; border-radius: 12px; border: 1px solid var(--border); background: var(--surface); display: inline-flex; align-items: center; justify-content: center; color: var(--muted); transition: background-color 160ms ease, border-color 160ms ease, color 160ms ease; }
        .icon-btn:hover { background: var(--surface-2); color: var(--text); }
        .icon-btn svg { width: 18px; height: 18px; }

        .search { flex: 1 1 auto; min-width: 180px; display: flex; align-items: center; gap: 10px; padding: 10px 12px; border: 1px solid var(--border); border-radius: 14px; background: var(--surface); box-shadow: 0 1px 0 rgba(15, 23, 42, 0.03); }
        .search input { width: 100%; border: none; outline: none; font-size: 14px; font-weight: 600; color: var(--text); background: transparent; }
        .search input::placeholder { color: rgba(100, 116, 139, 0.9); font-weight: 600; }

        .btn-primary { background-color: var(--primary); color: white; padding: 10px 14px; border-radius: 14px; font-size: 14px; font-weight: 900; transition: background-color 160ms ease, transform 120ms ease; box-shadow: 0 8px 18px rgba(3, 105, 161, 0.22); }
        .btn-primary:hover { background-color: var(--primary-hover); }
        .btn-primary:active { transform: translateY(1px); }

        .btn-pill { color: var(--text); padding: 10px 14px; border-radius: 999px; font-size: 14px; background: rgba(15, 23, 42, 0.04); border: 1px solid rgba(226, 232, 240, 0.9); transition: background-color 160ms ease, transform 120ms ease; font-weight: 900; }
        .btn-pill:hover { background: rgba(15, 23, 42, 0.07); }
        .btn-pill:active { transform: translateY(1px); }

        .chip { display: inline-flex; align-items: center; border-radius: 999px; padding: 4px 10px; font-size: 12px; font-weight: 900; border: 1px solid rgba(226, 232, 240, 0.9); background: rgba(241, 245, 249, 0.9); color: var(--text); }

        .apple-card {
            background-color: var(--surface);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            transition: box-shadow 160ms ease, transform 160ms ease;
            border: 1px solid var(--border);
        }
        .apple-card:hover { box-shadow: var(--shadow-hover); transform: translateY(-2px); }

        .mobile-nav { position: fixed; inset: 0; z-index: 60; display: none; }
        body[data-nav-open="true"] .mobile-nav { display: block; }
        .mobile-nav-backdrop { position: absolute; inset: 0; background: rgba(2, 6, 23, 0.56); }
        .mobile-nav-panel { position: absolute; top: 0; bottom: 0; left: 0; width: min(320px, 88vw); background: var(--surface); border-right: 1px solid var(--border); transform: translateX(-100%); transition: transform 220ms ease; }
        body[data-nav-open="true"] .mobile-nav-panel { transform: translateX(0); }

        @media (prefers-reduced-motion: reduce) {
            * { transition: none !important; animation: none !important; scroll-behavior: auto !important; }
        }

        .setting-item {
            display: flex;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid #f2f2f7;
        }
        .setting-item:last-child {
            border-bottom: none;
        }
    </style>

    <script>
        (function () {
            var openButtons = document.querySelectorAll("[data-nav-open]");
            var closeButtons = document.querySelectorAll("[data-nav-close]");
            function setOpen(open) {
                document.body.setAttribute("data-nav-open", open ? "true" : "false");
            }
            openButtons.forEach(function (btn) {
                btn.addEventListener("click", function () {
                    setOpen(true);
                });
            });
            closeButtons.forEach(function (btn) {
                btn.addEventListener("click", function () {
                    setOpen(false);
                });
            });
            document.addEventListener("keydown", function (e) {
                if (e.key === "Escape") setOpen(false);
            });
        })();
    </script>
