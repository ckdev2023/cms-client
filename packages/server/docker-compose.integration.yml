services:
  integration-pg:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: cms_test
      POSTGRES_PASSWORD: cms_test
      POSTGRES_DB: cms_test
    ports:
      - "5499:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cms_test -d cms_test"]
      interval: 2s
      timeout: 2s
      retries: 15
