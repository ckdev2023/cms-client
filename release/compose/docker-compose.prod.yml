# CMS 生产/测试环境 Compose（单客户测试期）
#
# 服务拓扑：
#   postgres ←─── migrate ←─── api ←─── web (caddy + admin)
#                          ↖── worker
#   redis    ←──────────────┘ (api & worker 都连)
#
# 用法：
#   cd release
#   cp .env.example .env && vi .env        # 必填：DOMAIN / POSTGRES_PASSWORD / CORS_ORIGINS
#   bash scripts/bootstrap.sh              # 第一次上线
#   bash scripts/deploy.sh                 # 后续升级
#   bash scripts/backup.sh                 # 手动/定时备份
#
# Build context = 仓库根（compose 文件在 release/compose/，所以 ../..）

# 默认日志策略：json-file driver + 容量上限，防止撑爆磁盘
# 每 service 最多保留 5 个 100MB 文件 = 500MB 上限
# 想换 Loki：见 compose/docker-compose.logs.yml overlay
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "100m"
    max-file: "5"
    compress: "true"

x-server-base: &server-base
  image: cms-server:latest
  build:
    context: ../..
    dockerfile: release/docker/server.Dockerfile
  environment:
    NODE_ENV: production
    DB_URL: postgres://${POSTGRES_USER:-cms}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-cms}
    REDIS_URL: redis://redis:6379
    STORAGE_PROVIDER: ${STORAGE_PROVIDER:-local}
    STORAGE_LOCAL_DIR: /data/storage
    STORAGE_S3_BUCKET: ${STORAGE_S3_BUCKET:-}
    STORAGE_S3_REGION: ${STORAGE_S3_REGION:-}
    STORAGE_S3_ENDPOINT: ${STORAGE_S3_ENDPOINT:-}
    TRANSLATION_PROVIDER: ${TRANSLATION_PROVIDER:-passthrough}
    TRANSLATION_API_KEY: ${TRANSLATION_API_KEY:-}
    WORKER_LOCK_TTL_SECONDS: ${WORKER_LOCK_TTL_SECONDS:-600}
  volumes:
    - ../data/storage:/data/storage
  logging: *default-logging

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-cms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-cms}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cms} -d ${POSTGRES_DB:-cms}"]
      interval: 5s
      timeout: 3s
      retries: 20
    # 仅暴露在内部网络，不映射到宿主机端口
    expose:
      - "5432"
    labels:
      cms.role: "postgres"
    logging: *default-logging

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    expose:
      - "6379"
    labels:
      cms.role: "redis"
    logging: *default-logging

  # 一次性迁移服务：每次部署前会跑一次，成功后退出
  migrate:
    <<: *server-base
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    # CORS 在 migrate 阶段不需要，env.ts 里 corsOrigins 是可选的
    environment:
      NODE_ENV: production
      DB_URL: postgres://${POSTGRES_USER:-cms}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-cms}
      REDIS_URL: redis://redis:6379
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-local}
      STORAGE_LOCAL_DIR: /data/storage
      TRANSLATION_PROVIDER: passthrough
    command: ["node", "--import", "tsx", "src/infra/db/runMigrations.ts", "migrate"]
    labels:
      cms.role: "migrate"

  api:
    <<: *server-base
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      NODE_ENV: production
      PORT: "3300"
      DB_URL: postgres://${POSTGRES_USER:-cms}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-cms}
      REDIS_URL: redis://redis:6379
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-local}
      STORAGE_LOCAL_DIR: /data/storage
      STORAGE_S3_BUCKET: ${STORAGE_S3_BUCKET:-}
      STORAGE_S3_REGION: ${STORAGE_S3_REGION:-}
      STORAGE_S3_ENDPOINT: ${STORAGE_S3_ENDPOINT:-}
      TRANSLATION_PROVIDER: ${TRANSLATION_PROVIDER:-passthrough}
      TRANSLATION_API_KEY: ${TRANSLATION_API_KEY:-}
      CORS_ORIGINS: ${CORS_ORIGINS:?CORS_ORIGINS is required, e.g. https://demo.example.com}
    expose:
      - "3300"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3300/health >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    labels:
      cms.role: "api"

  worker:
    <<: *server-base
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    command: ["node", "--import", "tsx", "src/worker.ts"]
    labels:
      cms.role: "worker"

  web:
    image: cms-admin:latest
    build:
      context: ../..
      dockerfile: release/docker/admin.Dockerfile
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      DOMAIN: ${DOMAIN:?DOMAIN is required, e.g. demo.example.com}
      ACME_EMAIL: ${ACME_EMAIL:-}
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    labels:
      cms.role: "web"
    logging: *default-logging

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
